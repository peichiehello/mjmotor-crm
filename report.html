<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顧關部當期匯報 - 銘勁汽車</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --red:#b91c1c;--red-light:#fee2e2;--red-mid:#fca5a5;
  --dark:#0f172a;--dark2:#1e293b;--dark3:#334155;
  --text:#111827;--text2:#374151;--text3:#6b7280;--text4:#9ca3af;
  --border:#e5e7eb;--bg:#f3f4f6;--white:#ffffff;
  --green:#16a34a;--green-bg:#dcfce7;
  --amber:#d97706;--amber-bg:#fef3c7;
  --blue:#1d4ed8;--blue-bg:#dbeafe;
}
body{font-family:'Segoe UI','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* Header */
.top-bar{background:var(--white);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:50;}
.top-bar .breadcrumb{font-size:11px;color:var(--text4);}
.top-bar .breadcrumb a{color:var(--text4);text-decoration:none;}
.top-bar .breadcrumb a:hover{color:var(--red);}
.top-bar .title-area{display:flex;align-items:center;gap:8px;flex:1;}
.top-bar .red-line{width:3px;height:22px;background:var(--red);border-radius:2px;flex-shrink:0;}
.top-bar h1{font-size:15px;font-weight:600;color:var(--text);}
.top-bar .subtitle{font-size:11px;color:var(--text3);}
.top-bar .controls{display:flex;align-items:center;gap:8px;margin-left:auto;}
.btn{font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--white);color:var(--text2);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:all .15s;}
.btn:hover{background:var(--bg);}
.btn-red{border-color:var(--red-mid);background:var(--red-light);color:var(--red);}
.btn-red:hover{background:#fecaca;}
.btn-dark{background:var(--dark2);color:var(--white);border-color:var(--dark3);}
.btn-dark:hover{background:var(--dark);}
.period-select{font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--white);color:var(--text2);font-family:inherit;cursor:pointer;}

/* Main layout */
.main-wrap{display:flex;flex:1;overflow:hidden;}

/* Left nav - slide thumbnails */
.slide-nav{width:140px;background:var(--dark2);overflow-y:auto;flex-shrink:0;padding:10px 8px;display:flex;flex-direction:column;gap:6px;}
.slide-thumb{border-radius:6px;padding:8px 10px;cursor:pointer;transition:all .15s;border:1.5px solid transparent;background:rgba(255,255,255,0.04);}
.slide-thumb:hover{background:rgba(255,255,255,0.08);}
.slide-thumb.active{background:rgba(185,28,28,0.2);border-color:#b91c1c;}
.slide-thumb-num{font-size:9px;color:var(--text4);margin-bottom:3px;}
.slide-thumb-title{font-size:11px;color:var(--white);font-weight:600;line-height:1.3;}
.slide-thumb-sub{font-size:9px;color:var(--text4);margin-top:2px;}

/* Slide content */
.slide-area{flex:1;overflow:hidden;position:relative;background:var(--bg);}
.slide-container{width:100%;height:100%;overflow:hidden;position:relative;}
.slide{position:absolute;inset:0;padding:0;display:none;flex-direction:column;overflow:hidden;}
.slide.active{display:flex;}

/* Slide inner scroll */
.slide-inner{flex:1;overflow-y:auto;overflow-x:hidden;}
.slide-inner::-webkit-scrollbar{width:5px;}
.slide-inner::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px;}

/* Slide header */
.slide-hd{background:var(--white);border-bottom:1px solid var(--border);padding:14px 24px 12px;flex-shrink:0;}
.slide-hd .slide-tag{font-size:10px;color:var(--text4);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.slide-hd h2{font-size:20px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;}
.slide-hd .slide-period{font-size:12px;color:var(--text3);margin-top:3px;}
.red-acc{width:3px;height:24px;background:var(--red);border-radius:2px;flex-shrink:0;}

/* KPI cards */
.kpi-row{display:grid;gap:10px;margin-bottom:14px;}
.kpi-row.cols-4{grid-template-columns:repeat(4,1fr);}
.kpi-row.cols-3{grid-template-columns:repeat(3,1fr);}
.kpi-row.cols-2{grid-template-columns:repeat(2,1fr);}
.kpi-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--card-accent,#e5e7eb);}
.kpi-label{font-size:11px;color:var(--text3);font-weight:600;margin-bottom:6px;}
.kpi-val{font-size:26px;font-weight:800;color:var(--text);line-height:1;margin-bottom:4px;}
.kpi-val .kpi-unit{font-size:13px;font-weight:500;color:var(--text3);}
.kpi-sub{font-size:11px;color:var(--text3);}
.kpi-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;margin-top:6px;}
.badge-green{background:var(--green-bg);color:var(--green);}
.badge-red{background:var(--red-light);color:var(--red);}
.badge-amber{background:var(--amber-bg);color:var(--amber);}
.badge-blue{background:var(--blue-bg);color:var(--blue);}

/* Section label */
.sec-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-left:2px;}

/* Compare row */
.compare-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.compare-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.compare-card.cur{border-color:var(--red-mid);}
.compare-title{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:8px;}
.compare-title span{background:var(--red);color:var(--white);padding:1px 6px;border-radius:3px;font-size:10px;margin-right:6px;}
.compare-title span.prev{background:#94a3b8;}

/* Data table */
.data-table{width:100%;border-collapse:collapse;font-size:12px;}
.data-table th{background:#f8fafc;padding:7px 10px;text-align:left;font-weight:600;font-size:11px;color:var(--text3);border-bottom:2px solid var(--border);}
.data-table td{padding:7px 10px;border-bottom:1px solid var(--border);}
.data-table tr:last-child td{border-bottom:none;}
.data-table .num{text-align:right;font-weight:600;}
.data-table .hi{color:var(--red);font-weight:700;}
.data-table .good{color:var(--green);font-weight:700;}

/* Bar */
.bar-wrap{background:#f3f4f6;border-radius:4px;height:8px;overflow:hidden;margin-top:4px;}
.bar-fill{height:100%;border-radius:4px;transition:width .6s ease;}

/* Progress ring */
.ring-wrap{display:flex;align-items:center;gap:16px;}

/* AI 總結區 */
.ai-section{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;}
.ai-section-hd{background:#fafafa;border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--text);}
.ai-section-body{padding:14px 16px;}
.ai-block{margin-bottom:14px;}
.ai-block:last-child{margin-bottom:0;}
.ai-block-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.ai-block-content{font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-wrap;}
.ai-block-content.loading{color:var(--text3);font-style:italic;}
.ai-note-area{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;font-family:inherit;color:var(--text);resize:vertical;min-height:80px;transition:border-color .15s;}
.ai-note-area:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 2px var(--red-light);}

/* Data status */
.data-status{display:flex;align-items:center;gap:6px;font-size:11px;padding:8px 12px;border-radius:6px;margin-bottom:10px;}
.data-status.ok{background:var(--green-bg);color:var(--green);}
.data-status.warn{background:var(--amber-bg);color:var(--amber);}
.data-status.miss{background:#f3f4f6;color:var(--text3);}

/* Slide navigation arrows */
.slide-arrows{display:flex;align-items:center;gap:6px;}
.arrow-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;}
.arrow-btn:hover:not(:disabled){background:var(--red-light);border-color:var(--red-mid);}
.arrow-btn:disabled{opacity:.35;cursor:default;}
.slide-counter{font-size:12px;color:var(--text3);min-width:40px;text-align:center;}

/* Saved badge */
.saved-badge{font-size:11px;padding:3px 8px;border-radius:6px;background:var(--green-bg);color:var(--green);font-weight:600;}
.error-badge{font-size:11px;padding:3px 8px;border-radius:6px;background:var(--red-light);color:var(--red);font-weight:600;}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;color:var(--text3);}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.4;}
.empty-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:6px;}
.empty-sub{font-size:12px;line-height:1.6;}

/* Cover slide */
.cover-slide{background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#1a1a2e 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;text-align:center;gap:0;position:relative;overflow:hidden;}
.cover-slide::before{content:'';position:absolute;top:-80px;right:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(185,28,28,0.2) 0%,transparent 70%);}
.cover-slide::after{content:'';position:absolute;bottom:-60px;left:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(185,28,28,0.12) 0%,transparent 70%);}
.cover-mg-logo{position:relative;z-index:1;margin-bottom:24px;}
.cover-title{position:relative;z-index:1;font-size:28px;font-weight:800;margin-bottom:8px;letter-spacing:-.5px;}
.cover-sub{position:relative;z-index:1;font-size:14px;color:#94a3b8;margin-bottom:24px;}
.cover-period{position:relative;z-index:1;background:rgba(185,28,28,0.25);border:1px solid rgba(185,28,28,0.4);padding:8px 24px;border-radius:20px;font-size:15px;font-weight:600;color:#fca5a5;margin-bottom:16px;}
.cover-info{position:relative;z-index:1;font-size:12px;color:#64748b;}
.cover-data-status{position:relative;z-index:1;margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.cover-ds-item{font-size:11px;padding:4px 10px;border-radius:4px;background:rgba(255,255,255,0.06);color:#94a3b8;border:1px solid rgba(255,255,255,0.1);}
.cover-ds-item.ok{background:rgba(22,163,74,0.15);color:#4ade80;border-color:rgba(22,163,74,0.3);}
.cover-ds-item.miss{background:rgba(185,28,28,0.12);color:#fca5a5;border-color:rgba(185,28,28,0.25);}

/* Diff indicator */
.diff-up{color:var(--green);font-size:11px;font-weight:600;}
.diff-down{color:var(--red);font-size:11px;font-weight:600;}
.diff-same{color:var(--text3);font-size:11px;}

/* Responsive slide content */
.slide-content-wrap{padding:16px 24px;max-width:1200px;width:100%;}
</style>
</head>
<body>

<div class="top-bar">
  <div style="flex:1;">
    <div class="breadcrumb"><a href="integration.html">顧關部</a> / 當期匯報</div>
    <div class="title-area" style="margin-top:4px;">
      <div class="red-line"></div>
      <div>
        <h1>當期匯報</h1>
        <div class="subtitle">整合各子系統數據 · AI 輔助分析</div>
      </div>
    </div>
  </div>
  <div class="controls">
    <select id="period-select" class="period-select" onchange="onPeriodChange(this.value)"></select>
    <div class="slide-arrows">
      <button class="arrow-btn" id="prev-btn" onclick="prevSlide()" disabled title="上一張">◀</button>
      <span class="slide-counter" id="slide-counter">1 / 6</span>
      <button class="arrow-btn" id="next-btn" onclick="nextSlide()" title="下一張">▶</button>
    </div>
    <button class="btn" style="border-color:#e5e7eb;background:#f9fafb;color:#374151;" onclick="showTokenSetup()" title="設定 GitHub Token">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Token 設定
    </button>
    <button class="btn btn-red" onclick="generateAI()" id="ai-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3z"/></svg>
      AI 產生總結
    </button>
    <button class="btn btn-dark" onclick="saveReport()" id="save-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      儲存匯報
    </button>
    <button class="btn" style="border-color:#6ee7b7;background:#f0fdf4;color:#065f46;" onclick="exportReport()" id="export-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      匯出匯報
    </button>
    <span id="save-status"></span>
  </div>
</div>

<div class="main-wrap">
  <!-- 左側縮略圖導航 -->
  <div class="slide-nav" id="slide-nav"></div>
  <!-- 投影片區 -->
  <div class="slide-area">
    <div class="slide-container" id="slide-container"></div>
  </div>
</div>

<script>
// ─── 狀態管理 ─────────────────────────────────────────────
let currentSlide = 0;
let currentPeriod = null; // 'YYYY_MM'
let allData = {};         // 當期數據
let prevData = {};        // 上期數據
let aiSummary = { achievements:'', improvements:'', notes:'' };
let userNote = '';
const SLIDES = [
  { id:'cover',    title:'封面',        sub:'期別總覽' },
  { id:'tcs',      title:'TCS 0800',    sub:'案件追蹤' },
  { id:'ssi',      title:'SSI / 試乘',  sub:'交車滿意度' },
  { id:'csi',      title:'CSI 滿意度',  sub:'服務廠績效' },
  { id:'biz',      title:'車美 / LINE', sub:'營運業務' },
  { id:'summary',  title:'綜合總結',    sub:'AI 分析建議' },
];

// ─── 期別管理 ─────────────────────────────────────────────
function buildPeriodList() {
  const set = new Set();
  // 從 localStorage 找所有 mj_* 開頭的 key，取出期別
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    const m=k?.match(/^mj_(?:tcs|ssi|csi|carcare|line|testdrive)_(\d{4}_\d{2})$/);
    if(m) set.add(m[1]);
  }
  // 也把已儲存的 report 加進去
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    const m=k?.match(/^mj_report_(\d{4}_\d{2})$/);
    if(m) set.add(m[1]);
  }
  // 加入當前月份
  const now=new Date(); const cur=now.getFullYear()+'_'+String(now.getMonth()+1).padStart(2,'0');
  set.add(cur);
  return Array.from(set).sort().reverse();
}

function initPeriodSelect() {
  const sel=document.getElementById('period-select');
  const list=buildPeriodList();
  sel.innerHTML=list.map(p=>{
    const [y,m]=p.split('_');
    return `<option value="${p}">${y}年${parseInt(m)}月</option>`;
  }).join('');
  if(list.length>0){ currentPeriod=list[0]; sel.value=list[0]; }
}

function onPeriodChange(val) {
  currentPeriod=val;
  loadPeriodData();
  renderAll();
}

// ─── 數據載入 ─────────────────────────────────────────────
function loadPeriodData() {
  if(!currentPeriod) return;
  const [yr,mo]=currentPeriod.split('_');
  allData={
    tcs:       tryLoad(`mj_tcs_${yr}_${mo}`),
    ssi:       tryLoad(`mj_ssi_${yr}_${mo}`),
    testdrive: tryLoad(`mj_testdrive_${yr}_${mo}`),
    csi:       tryLoad(`mj_csi_${yr}_${mo}`),
    carcare:   tryLoad(`mj_carcare_${yr}_${mo}`),
    line:      tryLoad(`mj_line_${yr}_${mo}`),
  };
  // 上期
  const prevMo = mo==='01' ? `${parseInt(yr)-1}_12` : `${yr}_${String(parseInt(mo)-1).padStart(2,'0')}`;
  prevData={
    tcs:       tryLoad(`mj_tcs_${prevMo}`),
    ssi:       tryLoad(`mj_ssi_${prevMo}`),
    testdrive: tryLoad(`mj_testdrive_${prevMo}`),
    csi:       tryLoad(`mj_csi_${prevMo}`),
    carcare:   tryLoad(`mj_carcare_${prevMo}`),
    line:      tryLoad(`mj_line_${prevMo}`),
  };
  // 已儲存的匯報
  const saved=tryLoad(`mj_report_${yr}_${mo}`);
  if(saved){
    aiSummary=saved.aiSummary||{achievements:'',improvements:'',notes:''};
    userNote=saved.userNote||'';
  } else {
    aiSummary={achievements:'',improvements:'',notes:''};
    userNote='';
  }
}

function tryLoad(key) {
  try{ const v=localStorage.getItem(key); return v?JSON.parse(v):null; } catch(e){ return null; }
}

function fmt(n,unit=''){
  if(n==null||isNaN(n)) return '-';
  if(unit==='萬') return (n/10000).toFixed(1)+'萬';
  if(unit==='%') return n+'%';
  return new Intl.NumberFormat('zh-TW').format(Math.round(n));
}
function fmtDiff(cur,prev,unit='',reverse=false){
  if(cur==null||prev==null) return '';
  const d=typeof cur==='number'&&typeof prev==='number'?cur-prev:null;
  if(d===null) return '';
  const sign=d>=0?'+':''; const better=reverse?(d<=0):(d>=0);
  const cls=better?'diff-up':'diff-down';
  return `<span class="${cls}">${sign}${typeof d==='number'?d.toFixed(d%1===0?0:1):''}${unit}</span>`;
}

// ─── 投影片建立 ────────────────────────────────────────────
function dataStatusDot(key){
  return allData[key]?'✅':'⭕';
}
function statusClass(key){
  return allData[key]?'ok':'miss';
}

function renderAll(){
  renderNav();
  renderSlides();
  updateArrows();
}

function renderNav(){
  const nav=document.getElementById('slide-nav');
  nav.innerHTML=SLIDES.map((s,i)=>`
    <div class="slide-thumb ${i===currentSlide?'active':''}" onclick="goSlide(${i})">
      <div class="slide-thumb-num">SLIDE ${i+1}</div>
      <div class="slide-thumb-title">${s.title}</div>
      <div class="slide-thumb-sub">${s.sub}</div>
    </div>
  `).join('');
}

function renderSlides(){
  const cont=document.getElementById('slide-container');
  cont.innerHTML='';
  SLIDES.forEach((s,i)=>{
    const div=document.createElement('div');
    div.className='slide'+(i===currentSlide?' active':'');
    div.id='slide-'+i;
    div.innerHTML=buildSlide(s.id, i);
    cont.appendChild(div);
  });
  updateCounter();
  // 綁定 textarea
  const ta=document.getElementById('user-note-area');
  if(ta){ ta.value=userNote; ta.addEventListener('input',e=>{userNote=e.target.value;}); }
  // 顯示已有的 AI 結果
  renderAIText();
}

function buildSlide(id, idx){
  if(id==='cover') return buildCoverSlide();
  if(id==='tcs')   return buildTCSSlide();
  if(id==='ssi')   return buildSSISlide();
  if(id==='csi')   return buildCSISlide();
  if(id==='biz')   return buildBizSlide();
  if(id==='summary') return buildSummarySlide();
  return '';
}

// ── Slide 1: 封面 ──────────────────────────────────────────
function buildCoverSlide(){
  if(!currentPeriod) return '<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">無資料</div></div>';
  const [yr,mo]=currentPeriod.split('_');
  const hasSources=Object.values(allData).some(v=>v!==null);
  const sources=['tcs','ssi','testdrive','csi','carcare','line'];
  const sourceLabels={tcs:'TCS',ssi:'SSI',testdrive:'試乘',csi:'CSI',carcare:'車美部',line:'LINE@'};
  const now=new Date(); const savedAt=tryLoad(`mj_report_${yr}_${mo}`)?.savedAt;
  return `
  <div class="cover-slide slide-inner" style="min-height:100%;">
    <div class="cover-mg-logo">
      <svg width="60" height="70" viewBox="0 0 50 58">
        <polygon points="15,2 35,2 48,15 48,35 35,48 15,48 2,35 2,15" fill="#b91c1c" stroke="#fff" stroke-width="1.5"/>
        <text x="25" y="31" font-size="20" font-weight="bold" fill="white" text-anchor="middle" font-family="serif" letter-spacing="-1">MG</text>
        <text x="25" y="55" font-size="7" fill="#b91c1c" text-anchor="middle" font-weight="600">Since 1924</text>

    <div class="cover-sub">顧客關係部 整合匯報</div>
    <div class="cover-period">${yr} 年 ${parseInt(mo)} 月 當期報告</div>
    <div class="cover-info">製作單位：顧關部 ${savedAt?`· 最後儲存：${new Date(savedAt).toLocaleDateString('zh-TW')}`:''}</div>
    <div class="cover-data-status">

// ── Slide 2: TCS ───────────────────────────────────────────

  <div class="slide-hd">
    <div class="slide-tag">SLIDE 2 · 顧客滿意度</div>

  </div>
  <div class="slide-inner"><div class="slide-content-wrap">
    ${!d?`<div class="data-status miss">⭕ 尚無 TCS 數據，請至 TCS 0800 系統選擇月份後系統將自動同步</div>`:''}
    ${d?`
    <div class="kpi-row cols-4" style="margin-top:14px;">
      <div class="kpi-card" style="--card-accent:#b91c1c;">
        <div class="kpi-label">本月案件總數</div>
        <div class="kpi-val">${fmt(d.total)}<span class="kpi-unit"> 件</span></div>
        <div class="kpi-sub">${fmtDiff(d.total,p?.total,'件')} 較上期</div>
      </div>
      <div class="kpi-card" style="--card-accent:#16a34a;">
        <div class="kpi-label">已結案</div>
        <div class="kpi-val">${fmt(d.closedCount)}<span class="kpi-unit"> 件</span></div>
        <div class="kpi-badge ${d.closeRate>=80?'badge-green':d.closeRate>=60?'badge-amber':'badge-red'}">${fmt(d.closeRate,'%')} 結案率</div>
      </div>
      <div class="kpi-card" style="--card-accent:#d97706;">
        <div class="kpi-label">未結案件</div>
        <div class="kpi-val" style="color:${d.pending>0?'#b91c1c':'#16a34a'}">${fmt(d.pending)}<span class="kpi-unit"> 件</span></div>
        ${d.pending>0?`<div class="kpi-badge badge-red">需追蹤</div>`:`<div class="kpi-badge badge-green">全數結案</div>`}
      </div>
      <div class="kpi-card" style="--card-accent:#1d4ed8;">
        <div class="kpi-label">5日內結案率</div>
        <div class="kpi-val">${fmt(d.met5dRate)}<span class="kpi-unit"> %</span></div>
        <div class="kpi-sub">1.5H 回覆率 ${fmt(d.met15hRate)}%</div>
      </div>

    ${catEntries.length>0?`
    <div class="sec-label">案件分類</div>
    <div style="background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;">
      <table class="data-table">
        <thead><tr><th>分類</th><th class="num">件數</th><th style="width:45%">佔比</th></tr></thead>
        <tbody>${catEntries.map(([cat,cnt])=>{
          const pct=d.total>0?((cnt/d.total)*100).toFixed(1):0;
          return `<tr><td>${cat}</td><td class="num">${cnt}</td><td>
            <div style="display:flex;align-items:center;gap:8px;">
              <div class="bar-wrap" style="flex:1;"><div class="bar-fill" style="width:${pct}%;background:#b91c1c;"></div></div>
              <span style="font-size:11px;color:var(--text3);min-width:36px;">${pct}%</span>
            </div></td></tr>`;

    </div>`:''}
    ${p?`
    <div class="sec-label">與上期對比</div>
    <div class="compare-row">
      <div class="compare-card cur"><div class="compare-title"><span>本期</span>${yr}年${parseInt(mo)}月</div>
        <div style="font-size:13px;color:var(--text2);">案件 ${fmt(d.total)} 件 / 結案 ${fmt(d.closeRate)}% / 未結 ${fmt(d.pending)}</div>
      </div>
      <div class="compare-card"><div class="compare-title"><span class="prev">上期</span></div>
        <div style="font-size:13px;color:var(--text2);">案件 ${fmt(p.total)} 件 / 結案 ${fmt(p.closeRate)}% / 未結 ${fmt(p.pending)}</div>

// ── Slide 3: SSI + 試乘 ────────────────────────────────────
function buildSSISlide(){
  const d=allData.ssi, p=prevData.ssi;
  const td=allData.testdrive, tp=prevData.testdrive;
  const [yr,mo]=currentPeriod?.split('_')||['--','--'];
  const dist=d?.scoreDistribution||{};
  const distEntries=[['1000分',dist.s1000||0],['980-999',dist.s980||0],['960-979',dist.s960||0],['900-959',dist.s900||0],['900以下',dist.below900||0]];
  const total=Object.values(dist).reduce((a,b)=>a+b,0);
  const tdDist=td?.scoreDistribution||{};
  const tdTotal=(tdDist.s10||0)+(tdDist.s98||0)+(tdDist.s96||0)+(tdDist.s90||0)+(tdDist.below90||0);
  return `
  <div class="slide-hd">
    <div class="slide-tag">SLIDE 3 · 顧客滿意度</div>
    <h2><div class="red-acc"></div>SSI 交車滿意度 · 試乘滿意度</h2>
    <div class="slide-period">${yr}年${parseInt(mo)}月</div>
  </div>
  <div class="slide-inner"><div class="slide-content-wrap">

    <div class="sec-label" style="margin-top:14px;">🚗 SSI 交車滿意度</div>
    ${!d?`<div class="data-status miss">⭕ 尚無 SSI 數據，請至 SSI 滿意度系統 SharePoint 同步或手動上傳</div>`:`
    <div class="kpi-row cols-4">
      <div class="kpi-card" style="--card-accent:#b91c1c;">
        <div class="kpi-label">銘勁 JDP 分數</div>
        <div class="kpi-val">${d.jdp??'-'}</div>
        <div class="kpi-sub">MGT 均值 ${d.mgt??'-'}</div>
        ${d.jdp&&d.mgt?`<div class="kpi-badge ${d.jdp>=d.mgt?'badge-green':'badge-red'}">${d.jdp>=d.mgt?'高於':'低於'} MGT ${Math.abs((d.jdp-d.mgt).toFixed(1))}</div>`:''}
      </div>
      <div class="kpi-card" style="--card-accent:#1d4ed8;">
        <div class="kpi-label">全台排名</div>
        <div class="kpi-val">${d.rank?'#'+d.rank:'-'}<span class="kpi-unit"> / ${d.totalDealers??'-'}</span></div>
        <div class="kpi-sub">${fmtDiff(d.rank,p?.rank,'',true)} 較上期</div>
      </div>
      <div class="kpi-card" style="--card-accent:#16a34a;">
        <div class="kpi-label">有效填卷數</div>
        <div class="kpi-val">${fmt(d.sampleCount)}<span class="kpi-unit"> 份</span></div>
        <div class="kpi-sub">${fmtDiff(d.sampleCount,p?.sampleCount,'份')} 較上期</div>
      </div>
      <div class="kpi-card" style="--card-accent:#d97706;">
        <div class="kpi-label">低分案件（＜9.5）</div>
        <div class="kpi-val" style="color:${d.lowScoreCount>0?'#b91c1c':'#16a34a'}">${fmt(d.lowScoreCount)}<span class="kpi-unit"> 件</span></div>
        ${d.lowScoreCount>0?`<div class="kpi-badge badge-red">需關注</div>`:`<div class="kpi-badge badge-green">良好</div>`}
      </div>
    </div>
    ${d.plantScores&&d.plantScores.length>0?`
    <div class="kpi-row" style="grid-template-columns:repeat(${Math.min(d.plantScores.length,3)},1fr);margin-bottom:14px;">
      ${d.plantScores.map(ps=>`
        <div class="kpi-card" style="--card-accent:#64748b;">
          <div class="kpi-label">${ps.name}</div>
          <div class="kpi-val" style="font-size:20px;">${ps.score??'-'}</div>
          ${d.mgt?`<div class="kpi-badge ${ps.score>=d.mgt?'badge-green':'badge-red'}">${ps.score>=d.mgt?'↑':'↓'} MGT</div>`:''}
        </div>`).join('')}
    </div>`:''}
    ${total>0?`
    <div class="sec-label">SSI 分數分布</div>
    <div style="background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:18px;">
      <table class="data-table">
        <thead><tr><th>區間</th><th class="num">件數</th><th style="width:45%">佔比</th></tr></thead>
        <tbody>${distEntries.map(([lbl,cnt])=>{
          const pct=total>0?((cnt/total)*100).toFixed(1):0;
          const isTop=lbl==='1000分';
          return `<tr><td style="${isTop?'font-weight:700;color:#16a34a':''}">${lbl}</td><td class="num ${isTop?'good':''}">${cnt}</td><td>
            <div style="display:flex;align-items:center;gap:8px;">
              <div class="bar-wrap" style="flex:1;"><div class="bar-fill" style="width:${pct}%;background:${isTop?'#16a34a':'#b91c1c'};"></div></div>
              <span style="font-size:11px;color:var(--text3);min-width:36px;">${pct}%</span>
            </div></td></tr>`;
        }).join('')}</tbody>
      </table>
    </div>`:''}
    `}

    <div class="sec-label">🏎️ 試乘滿意度</div>
    ${!td?`<div class="data-status miss">⭕ 尚無試乘數據，請至試乘滿意度系統 SharePoint 同步或手動上傳</div>`:`
    <div class="kpi-row cols-4">
      <div class="kpi-card" style="--card-accent:#7c3aed;">
        <div class="kpi-label">銘勁試乘分數</div>
        <div class="kpi-val">${td.score??'-'}</div>
        <div class="kpi-sub">${fmtDiff(td.score,tp?.score,'')} 較上期</div>
      </div>
      <div class="kpi-card" style="--card-accent:#1d4ed8;">
        <div class="kpi-label">全台排名</div>
        <div class="kpi-val">${td.rank?'#'+td.rank:'-'}<span class="kpi-unit"> / ${td.totalDealers??'-'}</span></div>
        <div class="kpi-sub">${fmtDiff(td.rank,tp?.rank,'',true)} 較上期</div>
      </div>
      <div class="kpi-card" style="--card-accent:#16a34a;">
        <div class="kpi-label">試乘件數</div>
        <div class="kpi-val">${fmt(td.sampleCount)}<span class="kpi-unit"> 件</span></div>
        <div class="kpi-sub">${fmtDiff(td.sampleCount,tp?.sampleCount,'件')} 較上期</div>
      </div>
      <div class="kpi-card" style="--card-accent:#d97706;">
        <div class="kpi-label">滿意率（≥9.0）</div>
        <div class="kpi-val" style="color:${(td.satisfyRate||0)>=90?'#16a34a':'#b91c1c'}">${td.satisfyRate??'-'}<span class="kpi-unit"> %</span></div>
        <div class="kpi-badge ${(td.satisfyRate||0)>=90?'badge-green':'badge-red'}">${(td.satisfyRate||0)>=90?'良好':'需改善'}</div>
      </div>
    </div>
    ${td.plantScores&&td.plantScores.length>0?`
    <div class="kpi-row" style="grid-template-columns:repeat(${Math.min(td.plantScores.length,3)},1fr);margin-bottom:14px;">
      ${td.plantScores.map(ps=>`
        <div class="kpi-card" style="--card-accent:#a855f7;">
          <div class="kpi-label">${ps.name}</div>
          <div class="kpi-val" style="font-size:20px;">${ps.score??'-'}</div>
        </div>`).join('')}
    </div>`:''}
    ${tdTotal>0?`
    <div class="sec-label">試乘分數分布</div>
    <div style="background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;">
      <table class="data-table">
        <thead><tr><th>區間</th><th class="num">件數</th><th style="width:45%">佔比</th></tr></thead>
        <tbody>${[['10分',tdDist.s10||0],['9.8+',tdDist.s98||0],['9.6+',tdDist.s96||0],['9.0+',tdDist.s90||0],['9.0以下',tdDist.below90||0]].map(([lbl,cnt])=>{
          const pct=tdTotal>0?((cnt/tdTotal)*100).toFixed(1):0;
          const isTop=lbl==='10分';
          return `<tr><td style="${isTop?'font-weight:700;color:#16a34a':''}">${lbl}</td><td class="num ${isTop?'good':''}">${cnt}</td><td>
            <div style="display:flex;align-items:center;gap:8px;">
              <div class="bar-wrap" style="flex:1;"><div class="bar-fill" style="width:${pct}%;background:${isTop?'#16a34a':'#7c3aed'};"></div></div>
              <span style="font-size:11px;color:var(--text3);min-width:36px;">${pct}%</span>
            </div></td></tr>`;
        }).join('')}</tbody>
      </table>
    </div>`:''}
    `}
  </div></div>`;
}

// ── Slide 4: CSI ───────────────────────────────────────────
function buildCSISlide(){
  const d=allData.csi, p=prevData.csi;
  const [yr,mo]=currentPeriod?.split('_')||['--','--'];
  const qLabels={Q2:'立即接待',Q3:'需求確認',Q4:'取車時間',Q5:'費用說明',Q6:'進度告知',Q7:'飲料點心',Q8:'準時完修',Q9:'一次修好',Q10:'車輛清潔',Q11:'整體滿意'};
  const qKeys=Object.keys(qLabels);
  return `
  <div class="slide-hd">
    <div class="slide-tag">SLIDE 4 · 顧客滿意度</div>
    <h2><div class="red-acc"></div>CSI 售後服務滿意度</h2>
    <div class="slide-period">${yr}年${parseInt(mo)}月 · 數據截至 ${d?.updatedAt?new Date(d.updatedAt).toLocaleDateString('zh-TW'):'--'}</div>
  </div>
  <div class="slide-inner"><div class="slide-content-wrap">
    ${!d?`<div class="data-status miss">⭕ 尚無 CSI 數據，請至 CSI 滿意度系統上傳報表</div>`:''}
    ${d?`
    <div class="kpi-row cols-4" style="margin-top:14px;">
      <div class="kpi-card" style="--card-accent:#b91c1c;">
        <div class="kpi-label">銘勁整體分數</div>
        <div class="kpi-val">${d.score??'-'}</div>
        <div class="kpi-sub">MGT 均值 ${d.mgt??'-'}</div>
        ${d.score&&d.mgt?`<div class="kpi-badge ${d.score>=d.mgt?'badge-green':'badge-red'}">${d.score>=d.mgt?'高於':'低於'} MGT</div>`:''}
      </div>
      <div class="kpi-card" style="--card-accent:#2563eb;">
        <div class="kpi-label">中壢廠</div>
        <div class="kpi-val" style="font-size:22px;">${d.zlScore??'-'}</div>
        ${d.zlScore&&d.mgt?`<div class="kpi-badge ${d.zlScore>=d.mgt?'badge-green':'badge-red'}">${d.zlScore>=d.mgt?'達標':'需改善'}</div>`:''}
      </div>
      <div class="kpi-card" style="--card-accent:#7c3aed;">
        <div class="kpi-label">八德廠</div>
        <div class="kpi-val" style="font-size:22px;">${d.bdScore??'-'}</div>
        ${d.bdScore&&d.mgt?`<div class="kpi-badge ${d.bdScore>=d.mgt?'badge-green':'badge-red'}">${d.bdScore>=d.mgt?'達標':'需改善'}</div>`:''}
      </div>
      <div class="kpi-card" style="--card-accent:#d97706;">
        <div class="kpi-label">Q11 低分件數</div>
        <div class="kpi-val" style="color:${(d.lowQ11Count||0)>0?'#b91c1c':'#16a34a'};font-size:22px;">${fmt(d.lowQ11Count??0)}<span class="kpi-unit"> 件</span></div>
        ${(d.lowQ11Count||0)>0?`<div class="kpi-badge badge-red">需追蹤</div>`:`<div class="kpi-badge badge-green">良好</div>`}
      </div>
    </div>
    ${Object.keys(d.qScores||{}).length>0?`
    <div class="sec-label">各題目與 MGT 對比</div>
    <div style="background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;">
      <table class="data-table">
        <thead><tr><th>題目</th><th class="num">銘勁</th><th class="num">MGT</th><th class="num">差值</th></tr></thead>
        <tbody>${qKeys.map(q=>{
          const mj=d.qScores[q], mgt=d.mgtQScores?.[q];
          if(mj==null) return '';
          const diff=mj&&mgt?(mj-mgt).toFixed(1):null;
          return `<tr>
            <td>${qLabels[q]}</td>
            <td class="num ${mj&&mgt&&mj<mgt?'hi':'good'}">${mj??'-'}</td>
            <td class="num">${mgt??'-'}</td>
            <td class="num">${diff!=null?`<span class="${parseFloat(diff)>=0?'diff-up':'diff-down'}">${parseFloat(diff)>=0?'+':''}${diff}</span>`:'-'}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>`:''}
    `:''}
  </div></div>`;
}

// ─── GitHub Actions 設定 ────────────────────────────────────
const GH_OWNER  = 'peichiehello';
const GH_REPO   = 'mjmotor-crm';
const GH_RAW    = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/api_result/latest.json`;
const GH_DISPATCH = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/actions/workflows/ai_generate.yml/dispatches`;

// Token 從 localStorage 讀取，不寫在程式碼裡（避免 GitHub 自動撤銷）
function getGHToken(){ return localStorage.getItem('mj_gh_token')||''; }
function setGHToken(t){ localStorage.setItem('mj_gh_token', t.trim()); }
function showTokenSetup(){
  const cur = getGHToken();
  const t = prompt(
    'GitHub Personal Access Token 設定\n（Fine-grained token，github_pat_... 開頭）\n\n' +
    (cur ? '目前已設定，直接按確定保留，或輸入新 Token 覆蓋' : '尚未設定，請輸入 Token'),
    cur
  );
  if(t && t.trim()){ setGHToken(t); alert('✅ Token 已儲存到瀏覽器，下次開啟不需要重新輸入'); }
}

async function generateAI(){
  const btn=document.getElementById('ai-btn');
  if(!btn) return;

  // 設定未填提示
  const GH_TOKEN = getGHToken();
  if(!GH_TOKEN){
    const ok = confirm('尚未設定 GitHub Token，是否現在設定？');
    if(ok) showTokenSetup();
    return;
  }

  btn.innerHTML='⏳ 送出中...';
  btn.disabled=true;
  goSlide(5);
  ['ai-achievements','ai-improvements','ai-notes'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){el.textContent='正在分析數據，約需 30 秒...';el.className='ai-block-content loading';}
  });

  try{
    const prompt = buildAIPrompt();
    const requestId = Date.now().toString();

    // 1. 觸發 GitHub Actions
    const dispatchRes = await fetch(GH_DISPATCH, {
      method: 'POST',
      headers:{
        'Authorization': `Bearer ${GH_TOKEN}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        ref: 'main',
        inputs: { prompt, request_id: requestId }
      })
    });

    if(!dispatchRes.ok){
      const err = await dispatchRes.text();
      throw new Error(`GitHub dispatch 失敗 (${dispatchRes.status}): ${err}`);
    }

    btn.innerHTML='⏳ AI 分析中...';

    // 2. 輪詢等待結果（每 5 秒檢查一次，最多等 120 秒）
    let result = null;
    for(let i=0; i<24; i++){
      await new Promise(r=>setTimeout(r, 5000));
      try{
        const res = await fetch(GH_RAW + '?t=' + Date.now());
        if(res.ok){
          const data = await res.json();
          // 確認是本次請求的結果
          if(data.request_id === requestId && data.content){
            result = data;
            break;
          }
        }
      }catch(e){ /* 繼續等待 */ }
      btn.innerHTML=`⏳ 等待結果... (${(i+1)*5}s)`;
    }

    if(!result) throw new Error('等待逾時（120秒），請稍後再試或檢查 GitHub Actions 狀態');

    // 3. 解析並顯示
    const text = result.content?.find(b=>b.type==='text')?.text || '';
    parseAIResponse(text);
    renderAIText();

  }catch(e){
    console.error('AI 產生失敗', e);
    ['ai-achievements','ai-improvements','ai-notes'].forEach(id=>{
      const el=document.getElementById(id);
      if(el){el.textContent='產生失敗：'+e.message;el.className='ai-block-content loading';}
    });
  }

  btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3z"/></svg> AI 產生總結`;
  btn.disabled=false;
}

  const d=allData;
  return `你是銘勁汽車顧客關係部主任的助理，負責協助產生當期（${yr}年${parseInt(mo)}月）的整合匯報分析。

LINE@：${d.line?`會員${d.line.total}人、新增${d.line.newAdded}人、開啟率${d.line.openRate}%`:'無數據'}

只回傳JSON，不要加任何說明文字或markdown符號。`;
}

function parseAIResponse(text){
  try{
    const clean=text.replace(/```json|```/g,'').trim();
    const obj=JSON.parse(clean);
    aiSummary={
      achievements:obj.achievements||'',
      improvements:obj.improvements||'',
      notes:obj.notes||''
    };
  }catch(e){
    aiSummary={achievements:text,improvements:'',notes:''};
  }
}

function renderAIText(){
  const ach=document.getElementById('ai-achievements');
  const imp=document.getElementById('ai-improvements');
  const nt=document.getElementById('ai-notes');
  if(ach){ach.textContent=aiSummary.achievements||'（尚未產生）';ach.className='ai-block-content'+(aiSummary.achievements?'':' loading');}
  if(imp){imp.textContent=aiSummary.improvements||'（尚未產生）';imp.className='ai-block-content'+(aiSummary.improvements?'':' loading');}
  if(nt){nt.textContent=aiSummary.notes||'（尚未產生）';nt.className='ai-block-content'+(aiSummary.notes?'':' loading');}
}

function exportReport(){
  if(!currentPeriod){ setStatus('error','請先選擇期別'); return; }
  const note = document.getElementById('user-note-area')?.value || userNote;
  const [yr,mo] = currentPeriod.split('_');

  // 取上期 key
  const prevMo = mo==='01' ? `${parseInt(yr)-1}_12` : `${yr}_${String(parseInt(mo)-1).padStart(2,'0')}`;
  const pData = {
    tcs:       tryLoad(`mj_tcs_${prevMo}`),
    ssi:       tryLoad(`mj_ssi_${prevMo}`),
    testdrive: tryLoad(`mj_testdrive_${prevMo}`),
    csi:       tryLoad(`mj_csi_${prevMo}`),
    carcare:   tryLoad(`mj_carcare_${prevMo}`),
    line:      tryLoad(`mj_line_${prevMo}`),
  };

  const reportData = {
    period: currentPeriod,
    savedAt: new Date().toISOString(),
    allData,
    prevData: pData,
    aiSummary,
    userNote: note
  };

  // 解碼模板，填入數據
  const templateHtml = decodeURIComponent(escape(atob(EXPORT_TEMPLATE_B64)));
  const dataJson = JSON.stringify(reportData).replace(/</g,'\\u003c').replace(/>/g,'\\u003e');
  const finalHtml = templateHtml.replace('{{REPORT_DATA_JSON}}', dataJson)
    .replace('{{REPORT_TITLE}}', `銘勁汽車 顧關部匯報 ${yr}/${mo}`);

  // 下載
  const blob = new Blob([finalHtml], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `MingJin_CRM_Report_${yr}${mo}.html`;
  a.click();
  URL.revokeObjectURL(url);
  setStatus('ok','✓ 匯出完成');
}

// ─── 儲存匯報 ─────────────────────────────────────────────
function saveReport(){
  if(!currentPeriod){ setStatus('error','請選擇期別'); return; }
  const [yr,mo]=currentPeriod.split('_');
  const note=document.getElementById('user-note-area')?.value||userNote;
  userNote=note;
  const payload={
    period:currentPeriod,
    savedAt:new Date().toISOString(),
    allData, aiSummary, userNote:note
  };
  try{
    localStorage.setItem(`mj_report_${yr}_${mo}`, JSON.stringify(payload));
    setStatus('ok','✓ 已儲存');
    // 刷新期別選單（可能是新期別）
    initPeriodSelect();
    document.getElementById('period-select').value=currentPeriod;
  }catch(e){
    setStatus('error','儲存失敗');
  }
}

function setStatus(type, msg){
  const el=document.getElementById('save-status');
  if(!el) return;
  el.className=type==='ok'?'saved-badge':'error-badge';
  el.textContent=msg;
  setTimeout(()=>{el.textContent='';el.className='';},3000);
}

// ─── 投影片導航 ────────────────────────────────────────────
function goSlide(idx){
  currentSlide=Math.max(0,Math.min(idx,SLIDES.length-1));
  // 更新 active
  document.querySelectorAll('.slide').forEach((el,i)=>{
    el.classList.toggle('active',i===currentSlide);
  });
  document.querySelectorAll('.slide-thumb').forEach((el,i)=>{
    el.classList.toggle('active',i===currentSlide);
  });
  updateCounter();
  updateArrows();
}

function prevSlide(){ goSlide(currentSlide-1); }
function nextSlide(){ goSlide(currentSlide+1); }

function updateArrows(){
  const prev=document.getElementById('prev-btn');
  const next=document.getElementById('next-btn');
  if(prev) prev.disabled=currentSlide===0;
  if(next) next.disabled=currentSlide===SLIDES.length-1;
}

function updateCounter(){
  const el=document.getElementById('slide-counter');
  if(el) el.textContent=`${currentSlide+1} / ${SLIDES.length}`;
}

// 鍵盤方向鍵
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown') nextSlide();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') prevSlide();
});

// ─── 初始化 ────────────────────────────────────────────────
function init(){
  initPeriodSelect();
  loadPeriodData();
  renderAll();
}
init();
</script>
