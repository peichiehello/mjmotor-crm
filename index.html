<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>銘勁汽車 顧關部匯報 2026/07</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --red:#b91c1c;--red-l:#fee2e2;--red-m:#fca5a5;
  --dark:#0f172a;--dark2:#1e293b;--dark3:#334155;
  --tx:#111827;--tx2:#374151;--tx3:#6b7280;--tx4:#9ca3af;
  --bd:#e5e7eb;--bg:#f1f5f9;--wh:#ffffff;
  --gr:#16a34a;--gr-b:#dcfce7;--am:#d97706;--am-b:#fef3c7;--bl:#1d4ed8;--bl-b:#dbeafe;
}
html{scroll-behavior:smooth;}
body{font-family:'Segoe UI','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--tx);margin:0;}
.top-nav{position:sticky;top:0;z-index:100;background:var(--dark2);border-bottom:1px solid var(--dark3);display:flex;align-items:center;overflow-x:auto;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.top-nav::-webkit-scrollbar{height:2px;}
.top-nav::-webkit-scrollbar-thumb{background:#475569;}
.nav-logo{padding:10px 16px;border-right:1px solid var(--dark3);flex-shrink:0;display:flex;align-items:center;gap:10px;}
.nav-logo img{width:32px;height:32px;object-fit:contain;}
.nav-logo .logo-text{color:#fff;font-size:13px;font-weight:700;white-space:nowrap;}
.nav-logo .logo-sub{color:#64748b;font-size:10px;white-space:nowrap;}
.nav-tabs{display:flex;flex:1;}
.nav-tab{padding:0 14px;height:52px;display:flex;align-items:center;font-size:12px;font-weight:600;color:#94a3b8;cursor:pointer;border:none;background:none;font-family:inherit;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;text-decoration:none;}
.nav-tab:hover{color:#fff;background:rgba(255,255,255,.06);}
.nav-tab.active{color:#fca5a5;border-bottom-color:#b91c1c;background:rgba(185,28,28,.12);}
.nav-period{padding:0 16px;color:#fca5a5;font-size:12px;font-weight:600;margin-left:auto;flex-shrink:0;border-left:1px solid var(--dark3);display:flex;align-items:center;white-space:nowrap;}
.slide-section{min-height:100vh;border-bottom:4px solid var(--dark2);display:flex;flex-direction:column;scroll-margin-top:52px;}
.cover-section{background:linear-gradient(160deg,#0f172a 0%,#1a2540 50%,#0f172a 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 40px;position:relative;overflow:hidden;scroll-margin-top:52px;}
.cover-section::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(185,28,28,.2) 0%,transparent 70%);}
.cover-section::after{content:'';position:absolute;bottom:-80px;left:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(185,28,28,.12) 0%,transparent 70%);}
.cov-logo{position:relative;z-index:1;margin-bottom:28px;}
.cov-logo img{width:110px;height:110px;object-fit:contain;filter:drop-shadow(0 8px 24px rgba(185,28,28,.5));}
.cov-company{position:relative;z-index:1;font-size:13px;color:#64748b;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
.cov-title{position:relative;z-index:1;font-size:32px;font-weight:800;color:#fff;margin-bottom:6px;}
.cov-sub{position:relative;z-index:1;font-size:15px;color:#94a3b8;margin-bottom:28px;}
.cov-period{position:relative;z-index:1;background:rgba(185,28,28,.25);border:1px solid rgba(185,28,28,.45);padding:10px 32px;border-radius:24px;font-size:18px;font-weight:700;color:#fca5a5;margin-bottom:14px;}
.cov-date{position:relative;z-index:1;font-size:12px;color:#475569;margin-bottom:24px;}
.cov-status{position:relative;z-index:1;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.cov-ds{font-size:12px;padding:5px 14px;border-radius:5px;font-weight:600;}
.cov-ds.ok{background:rgba(22,163,74,.15);color:#4ade80;border:1px solid rgba(22,163,74,.3);}
.cov-ds.miss{background:rgba(185,28,28,.12);color:#fca5a5;border:1px solid rgba(185,28,28,.25);}
.scroll-hint{position:relative;z-index:1;margin-top:28px;color:#475569;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:6px;animation:bounce 2s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(6px);}}
.content-section{background:var(--bg);flex:1;}
.slide-hd{background:var(--wh);border-bottom:1px solid var(--bd);padding:16px 32px 14px;position:sticky;top:52px;z-index:50;}
.slide-tag{font-size:10px;font-weight:600;color:var(--tx4);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;}
.slide-hd h2{font-size:18px;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:8px;margin-bottom:2px;}
.red-acc{width:3px;height:22px;background:var(--red);border-radius:0;flex-shrink:0;}
.slide-period{font-size:12px;color:var(--tx3);}
.slide-body{padding:24px 32px 48px;max-width:1100px;}
.kpi-grid{display:grid;gap:10px;margin-bottom:18px;}
.g4{grid-template-columns:repeat(4,1fr);}
.g3{grid-template-columns:repeat(3,1fr);}
.g2{grid-template-columns:repeat(2,1fr);}
.kpi-card{background:var(--wh);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--acc,#e5e7eb);}
.kpi-label{font-size:11px;color:var(--tx3);font-weight:600;margin-bottom:6px;}
.kpi-val{font-size:26px;font-weight:800;line-height:1;margin-bottom:4px;color:var(--tx);}
.kpi-unit{font-size:13px;font-weight:500;color:var(--tx3);}
.kpi-sub{font-size:11px;color:var(--tx3);}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-top:6px;}
.bg{background:var(--gr-b);color:var(--gr);}
.br{background:var(--red-l);color:var(--red);}
.ba{background:var(--am-b);color:var(--am);}
.bb{background:var(--bl-b);color:var(--bl);}
.sec-label{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.dt{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px;background:var(--wh);border-radius:10px;overflow:hidden;border:1px solid var(--bd);}
.dt th{background:#f8fafc;padding:8px 12px;text-align:left;font-weight:600;font-size:11px;color:var(--tx3);border-bottom:2px solid var(--bd);}
.dt td{padding:8px 12px;border-bottom:1px solid var(--bd);}
.dt tr:last-child td{border-bottom:none;}
.num{text-align:right;font-weight:600;}
.hi{color:var(--red);font-weight:700;}
.good{color:var(--gr);font-weight:700;}
.bar-w{background:#f3f4f6;border-radius:4px;height:8px;overflow:hidden;}
.bar-f{height:100%;border-radius:4px;}
.cmp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.cmp-card{background:var(--wh);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;}
.cmp-card.cur{border-color:var(--red-m);border-width:1.5px;}
.cmp-title{font-size:11px;font-weight:600;color:var(--tx3);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.cmp-tag{padding:1px 7px;border-radius:3px;font-size:10px;font-weight:600;}
.dup{color:var(--gr);font-size:11px;font-weight:600;}
.ddn{color:var(--red);font-size:11px;font-weight:600;}
.data-miss{font-size:12px;color:var(--tx3);padding:12px 16px;background:#f8fafc;border:1px solid var(--bd);border-radius:8px;margin-bottom:14px;}
.ai-wrap{border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:14px;background:var(--wh);}
.ai-hd{background:#fafafa;border-bottom:1px solid var(--bd);padding:10px 16px;font-size:13px;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:8px;}
.ai-body{padding:16px;}
.ai-block{margin-bottom:16px;}
.ai-block:last-child{margin-bottom:0;}
.ai-tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:4px;display:inline-flex;margin-bottom:8px;}
.ai-text{font-size:13px;color:var(--tx2);line-height:1.85;white-space:pre-wrap;}
.note-box{background:#f8fafc;border:1px solid var(--bd);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--tx2);line-height:1.7;}
.rt-head{font-size:13px;font-weight:700;color:var(--red);margin:14px 0 6px;padding-left:8px;border-left:3px solid var(--red);}
.rt-head:first-child{margin-top:0;}
.rt-p{font-size:13px;color:var(--tx2);line-height:1.75;margin:2px 0;}
.rt-ul{margin:4px 0 4px 0;padding-left:20px;}
.rt-ul li{font-size:13px;color:var(--tx2);line-height:1.75;margin:3px 0;}
.next-hint{text-align:center;padding:20px;color:var(--tx4);font-size:12px;border-top:1px solid var(--bd);background:var(--wh);display:flex;flex-direction:column;align-items:center;gap:4px;}
.rpt-footer{background:var(--dark2);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:#475569;}
.footer-logo{display:flex;align-items:center;gap:10px;}
.footer-logo img{width:28px;height:28px;object-fit:contain;opacity:.7;}
</style>
</head>

function fmt(n,unit=''){
  if(n==null||isNaN(n)) return '-';
  if(unit==='萬') return (n/10000).toFixed(1)+'萬';
  if(unit==='%') return n+'%';
  return new Intl.NumberFormat('zh-TW').format(Math.round(n));
}

}

function ssiDist10(dist){
  if(!dist) return null;
  const tot=Object.values(dist).reduce((a,b)=>a+(b||0),0);
  if(tot<=0) return null;
  // 百分制 keys: s1000/s980/s960/s900/below900 → 10分制
  const map=[['10分',dist.s1000??dist.s10??0,true],['9.8+',dist.s980??dist.s98??0,false],
    ['9.6+',dist.s960??dist.s96??0,false],['9.0+',dist.s900??dist.s90??0,false],
    ['9.0以下',dist.below900??dist.below90??0,false]];
  return {tot,rows:map};
}
// 富文本：【標題】→小標、數字/符號清單→條列、空行→分段
function richText(raw){
  if(!raw) return '';
  const lines=raw.replace(/\\r/g,'').split('\n');
  let html='',inList=false;
  const closeList=()=>{ if(inList){html+='</ul>';inList=false;} };
  for(let ln of lines){
    const t=ln.trim();
    if(t===''){ closeList(); html+='<div style="height:8px"></div>'; continue; }
    const head=t.match(/^【(.+?)】(.*)$/);
    if(head){ closeList();
      html+=`<div class="rt-head">${head[1]}</div>`;
      if(head[2].trim()) html+=`<div class="rt-p">${head[2].trim()}</div>`;
      continue; }
    const li=t.match(/^(?:\d+[\.\、\)]|[\-\*•])\s+(.*)$/);
    if(li && !/^--/.test(t)){
      if(!inList){html+='<ul class="rt-ul">';inList=true;}
      html+=`<li>${li[1]}</li>`;
      continue; }
    closeList();
    html+=`<div class="rt-p">${t}</div>`;
  }
  closeList();
  return html;
}

        <h2><div class="red-acc"></div>TCS 0800 案件分析</h2>
        <div class="slide-period">${label}</div>
      </div>
      <div class="slide-body">
      ${!tcs?missBox('尚無 TCS 數據'):`${fbNote(tcsFb?`${tcsFb}月`:'')}
        <div class="kpi-grid g4" style="margin-top:4px">
          <div class="kpi-card" style="--acc:#b91c1c"><div class="kpi-label">本月案件總數</div><div class="kpi-val">${fmt(tcs.total)}<span class="kpi-unit"> 件</span></div><div class="kpi-sub">${diff(tcs.total,ptcs?.total,'件')} 較上期</div></div>
          <div class="kpi-card" style="--acc:#16a34a"><div class="kpi-label">已結案</div><div class="kpi-val">${fmt(tcs.closedCount)}<span class="kpi-unit"> 件</span></div>${badge(tcs.closeRate>=80,tcs.closeRate+'% 結案率',tcs.closeRate+'% 結案率')}</div>
          <div class="kpi-card" style="--acc:#d97706"><div class="kpi-label">未結案件</div><div class="kpi-val" style="color:${tcs.pending>0?'#b91c1c':'#16a34a'}">${fmt(tcs.pending)}<span class="kpi-unit"> 件</span></div>${badge(tcs.pending===0,'全數結案','需追蹤')}</div>
          <div class="kpi-card" style="--acc:#1d4ed8"><div class="kpi-label">5日內結案率</div><div class="kpi-val">${fmt(tcs.met5dRate)}<span class="kpi-unit"> %</span></div><div class="kpi-sub">1.5H 回覆率 ${fmt(tcs.met15hRate)}%</div></div>
        </div>
        ${Object.keys(tcs.categories||{}).length>0?`
        <div class="sec-label">案件分類</div>
        <table class="dt"><thead><tr><th>分類</th><th class="num">件數</th><th style="width:45%">佔比</th></tr></thead>
        <tbody>${Object.entries(tcs.categories).sort((a,b)=>b[1]-a[1]).map(([cat,cnt])=>barRow(cat,cnt,tcs.total,'#b91c1c',false)).join('')}</tbody></table>`:''}
        ${ptcs?`<div class="cmp-row">
          <div class="cmp-card cur"><div class="cmp-title"><span class="cmp-tag" style="background:#fee2e2;color:#b91c1c">本期</span>${label}</div><div style="font-size:13px;color:#374151">案件 ${fmt(tcs.total)}件 / 結案率 ${fmt(tcs.closeRate)}% / 未結 ${fmt(tcs.pending)}</div></div>
          <div class="cmp-card"><div class="cmp-title"><span class="cmp-tag" style="background:#f1f5f9;color:#64748b">上期</span></div><div style="font-size:13px;color:#374151">案件 ${fmt(ptcs.total)}件 / 結案率 ${fmt(ptcs.closeRate)}% / 未結 ${fmt(ptcs.pending)}</div></div>
        </div>`:''}
      `}
      </div>${nextHint()}
    </section>

    <!-- S2 SSI -->
    <section class="slide-section content-section" id="s2">
      <div class="slide-hd">
        <div class="slide-tag">SLIDE 3 · 顧客滿意度</div>
        <h2><div class="red-acc"></div>SSI 交車滿意度</h2>
        <div class="slide-period">${ssi?.dataMonth?`${label}（資料月：${ssi.dataMonth}）`:label}</div>
      </div>
      <div class="slide-body">
      ${!ssi?missBox('尚無 SSI 數據，請至 SSI 系統上傳後重新匯出'):`
        <div class="kpi-grid g4" style="margin-top:4px">
          <div class="kpi-card" style="--acc:#b91c1c"><div class="kpi-label">銘勁 JDP 分數</div><div class="kpi-val">${to10(ssi.jdp)??'-'}</div><div class="kpi-sub">MGT 均值 ${to10(ssi.mgt)??'-'}</div>${ssi.jdp&&ssi.mgt?badge(ssi.jdp>=ssi.mgt,`高於 MGT +${(to10(ssi.jdp)-to10(ssi.mgt)).toFixed(2)}`,`低於 MGT ${(to10(ssi.mgt)-to10(ssi.jdp)).toFixed(2)}`):''}</div>
          <div class="kpi-card" style="--acc:#1d4ed8"><div class="kpi-label">全台排名</div><div class="kpi-val">${ssi.rank?'#'+ssi.rank:'-'}<span class="kpi-unit"> / ${ssi.totalDealers??'-'}</span></div><div class="kpi-sub">${diff(ssi.rank,pssi?.rank,'',true)} 較上期</div></div>
          <div class="kpi-card" style="--acc:#16a34a"><div class="kpi-label">有效填卷數</div><div class="kpi-val">${fmt(ssi.sampleCount)}<span class="kpi-unit"> 份</span></div><div class="kpi-sub">${diff(ssi.sampleCount,pssi?.sampleCount,'份')} 較上期</div></div>
          <div class="kpi-card" style="--acc:#d97706"><div class="kpi-label">低分案件（＜9.5）</div><div class="kpi-val" style="color:${ssi.lowScoreCount>0?'#b91c1c':'#16a34a'}">${fmt(ssi.lowScoreCount)}<span class="kpi-unit"> 件</span></div>${badge(ssi.lowScoreCount===0,'良好','需關注')}</div>
        </div>
        ${ssi.plantScores?.length>0?`<div class="kpi-grid" style="grid-template-columns:repeat(${Math.min(ssi.plantScores.length,3)},1fr);margin-bottom:14px">
          ${ssi.plantScores.map(ps=>`<div class="kpi-card" style="--acc:#64748b"><div class="kpi-label">${ps.name}</div><div class="kpi-val" style="font-size:20px">${to10(ps.score)??'-'}</div>${ssi.mgt?badge(ps.score>=ssi.mgt,'↑ MGT','↓ MGT'):''}</div>`).join('')}
        </div>`:''}
        ${(()=>{const dd=ssiDist10(ssi.scoreDistribution);
          return dd?`<div class="sec-label">分數分布（10 分制）</div><table class="dt"><thead><tr><th>區間</th><th class="num">件數</th><th style="width:45%">佔比</th></tr></thead><tbody>
          ${dd.rows.map(([l,c,b])=>barRow(l,c,dd.tot,b?'#16a34a':'#b91c1c',b)).join('')}
          </tbody></table>`:'';})()}
      `}
      </div>${nextHint()}
    </section>

    <!-- S3 試乘 -->
    <section class="slide-section content-section" id="s3">
      <div class="slide-hd">
        <div class="slide-tag">SLIDE 4 · 顧客滿意度</div>
        <h2><div class="red-acc"></div>試乘滿意度</h2>
        <div class="slide-period">${label}</div>
      </div>
      <div class="slide-body">
      ${!td?missBox('尚無試乘數據，請至試乘滿意度系統上傳後重新匯出'):`
        <div class="kpi-grid g4" style="margin-top:4px">
          <div class="kpi-card" style="--acc:#7c3aed"><div class="kpi-label">銘勁試乘分數</div><div class="kpi-val">${td.score??'-'}</div><div class="kpi-sub">${diff(td.score,ptd?.score,'')} 較上期</div></div>
          <div class="kpi-card" style="--acc:#1d4ed8"><div class="kpi-label">全台排名</div><div class="kpi-val">${td.rank?'#'+td.rank:'-'}<span class="kpi-unit"> / ${td.totalDealers??'-'}</span></div><div class="kpi-sub">${diff(td.rank,ptd?.rank,'',true)} 較上期</div></div>
          <div class="kpi-card" style="--acc:#16a34a"><div class="kpi-label">試乘件數</div><div class="kpi-val">${fmt(td.sampleCount)}<span class="kpi-unit"> 件</span></div><div class="kpi-sub">${diff(td.sampleCount,ptd?.sampleCount,'件')} 較上期</div></div>
          <div class="kpi-card" style="--acc:#d97706"><div class="kpi-label">滿意率（≥9.0）</div>${(!td.sampleCount||td.satisfyRate==null)?`<div class="kpi-val" style="color:#9ca3af;font-size:18px">無樣本</div><div class="kpi-sub">來源未提供件數/分布</div>`:`<div class="kpi-val" style="color:${td.satisfyRate>=90?'#16a34a':'#b91c1c'}">${td.satisfyRate}<span class="kpi-unit"> %</span></div>${badge(td.satisfyRate>=90,'良好','需改善')}`}</div>
        </div>
        ${td.plantScores?.length>0?`<div class="kpi-grid" style="grid-template-columns:repeat(${Math.min(td.plantScores.length,3)},1fr);margin-bottom:14px">
          ${td.plantScores.map(ps=>`<div class="kpi-card" style="--acc:#a855f7"><div class="kpi-label">${ps.name}</div><div class="kpi-val" style="font-size:20px">${ps.score??'-'}</div></div>`).join('')}
        </div>`:''}
        ${(()=>{const dist=td.scoreDistribution||{};const tot=(dist.s10||0)+(dist.s98||0)+(dist.s96||0)+(dist.s90||0)+(dist.below90||0);
          return tot>0?`<div class="sec-label">試乘分數分布</div><table class="dt"><thead><tr><th>區間</th><th class="num">件數</th><th style="width:45%">佔比</th></tr></thead><tbody>
          ${[['10分',dist.s10||0,true],['9.8+',dist.s98||0,false],['9.6+',dist.s96||0,false],['9.0+',dist.s90||0,false],['9.0以下',dist.below90||0,false]].map(([l,c,b])=>barRow(l,c,tot,b?'#16a34a':'#7c3aed',b)).join('')}
          </tbody></table>`:'';})()}
      `}
      </div>${nextHint()}
    </section>

    <!-- S4 CSI -->
    <section class="slide-section content-section" id="s4">
      <div class="slide-hd">
        <div class="slide-tag">SLIDE 5 · 顧客滿意度</div>
        <h2><div class="red-acc"></div>CSI 售後服務滿意度</h2>
        <div class="slide-period">${label}</div>
      </div>
      <div class="slide-body">
      ${!csi?missBox('尚無 CSI 數據，請至 CSI 系統上傳後重新匯出'):`
        <div class="kpi-grid g4" style="margin-top:4px">
          <div class="kpi-card" style="--acc:#b91c1c"><div class="kpi-label">銘勁整體分數</div><div class="kpi-val">${csiFmt(csi.score)}</div><div class="kpi-sub">MGT 均值 ${csiFmt(csi.mgt)}</div>${csi.score&&csi.mgt?badge(csi.score>=csi.mgt,`高於 MGT +${(csi.score-csi.mgt).toFixed(is100(csi.score)?0:2)}`,`低於 MGT`):''}</div>
          <div class="kpi-card" style="--acc:#2563eb"><div class="kpi-label">中壢廠</div><div class="kpi-val" style="font-size:22px">${csiFmt(csi.zlScore)}</div>${csi.zlScore&&csi.mgt?badge(csi.zlScore>=csi.mgt,'達標','需改善'):''}</div>
          <div class="kpi-card" style="--acc:#7c3aed"><div class="kpi-label">八德廠</div><div class="kpi-val" style="font-size:22px">${csiFmt(csi.bdScore)}</div>${csi.bdScore&&csi.mgt?badge(csi.bdScore>=csi.mgt,'達標','需改善'):''}</div>
          <div class="kpi-card" style="--acc:#d97706"><div class="kpi-label">Q11 低分件數</div><div class="kpi-val" style="color:${(csi.lowQ11Count||0)>0?'#b91c1c':'#16a34a'};font-size:22px">${fmt(csi.lowQ11Count??0)}<span class="kpi-unit"> 件</span></div>${badge((csi.lowQ11Count||0)===0,'良好','需追蹤')}</div>
        </div>
        ${Object.keys(csi.qScores||{}).length>0?`
        <div class="sec-label">各題目與 MGT 對比</div>
        <table class="dt"><thead><tr><th>題目</th><th class="num">銘勁</th><th class="num">MGT</th><th class="num">差值</th></tr></thead>
        <tbody>${Object.entries(csi.qScores).map(([q,mj])=>{
          const labels={Q2:'立即接待',Q3:'需求確認',Q4:'取車時間',Q5:'費用說明',Q6:'進度告知',Q7:'飲料點心',Q8:'準時完修',Q9:'一次修好',Q10:'車輛清潔',Q11:'整體滿意'};
          const mgt=csi.mgtQScores?.[q]; const d2=mj&&mgt?(mj-mgt).toFixed(is100(mj)?0:2):null;
          return `<tr><td>${labels[q]||q}</td><td class="num ${mj&&mgt&&mj<mgt?'hi':'good'}">${csiFmt(mj)}</td><td class="num">${csiFmt(mgt)}</td>
            <td class="num">${d2!=null?`<span class="${parseFloat(d2)>=0?'dup':'ddn'}">${parseFloat(d2)>=0?'+':''}${d2}</span>`:'-'}</td></tr>`;
        }).join('')}</tbody></table>`:''}
      `}
      </div>${nextHint()}
    </section>

    <!-- S5 車美+LINE -->
    <section class="slide-section content-section" id="s5">
      <div class="slide-hd">
        <div class="slide-tag">SLIDE 6 · 營運業務</div>
        <h2><div class="red-acc"></div>車美部 · LINE@ 會員</h2>
        <div class="slide-period">${label}</div>
      </div>
      <div class="slide-body">
        <div class="sec-label" style="margin-top:4px">✨ 車美部業績</div>
        ${!cc?missBox('尚無車美部數據'):`${fbNote(ccFb?`${ccFb}月`:'')}
        <div class="kpi-grid g4" style="margin-bottom:20px">
          <div class="kpi-card" style="--acc:#7c3aed"><div class="kpi-label">本月營收</div><div class="kpi-val" style="font-size:22px">${fmt(cc.revenue,'萬')}</div><div class="kpi-sub">${diff(cc.revenue,pcc?.revenue,'元')} 較上期</div></div>
          <div class="kpi-card" style="--acc:#16a34a"><div class="kpi-label">服務件數</div><div class="kpi-val" style="font-size:22px">${fmt(cc.count)}<span class="kpi-unit"> 件</span></div><div class="kpi-sub">客單價 ${fmt(cc.unitPrice)} 元</div></div>
          <div class="kpi-card" style="--acc:#d97706"><div class="kpi-label">目標達成率</div><div class="kpi-val" style="font-size:22px;color:${cc.achieveRate>=100?'#16a34a':cc.achieveRate>=70?'#d97706':'#b91c1c'}">${cc.achieveRate!=null?cc.achieveRate+'%':'-'}</div>${cc.target?`<div class="kpi-sub">目標 ${fmt(cc.target,'萬')}</div>`:''}</div>
          <div class="kpi-card" style="--acc:#1d4ed8"><div class="kpi-label">服務部招攬</div><div class="kpi-val" style="font-size:22px">${fmt(cc.svcRevenue,'萬')}</div><div class="kpi-sub">${fmt(cc.svcCount)} 件</div></div>
        </div>`}
        <div class="sec-label">💬 LINE@ 會員</div>
        ${!ln?missBox('尚無 LINE@ 數據'):`${fbNote(lnFb?`${lnFb}月`:'')}
        <div class="kpi-grid g4">
          <div class="kpi-card" style="--acc:#06b6d4"><div class="kpi-label">會員總數</div><div class="kpi-val" style="font-size:22px">${fmt(ln.total)}</div><div class="kpi-sub">${diff(ln.total,pln?.total,'人')} 較上期</div></div>
          <div class="kpi-card" style="--acc:#16a34a"><div class="kpi-label">本月新增</div><div class="kpi-val" style="font-size:22px">+${fmt(ln.newAdded)}</div><div class="kpi-sub">${diff(ln.newAdded,pln?.newAdded,'人')} 較上期</div></div>
          <div class="kpi-card" style="--acc:#d97706"><div class="kpi-label">推播開啟率</div><div class="kpi-val" style="font-size:22px">${fmt(ln.openRate,'%')}</div>${badge(ln.openRate>=60,'優異',ln.openRate>=40?'正常':'需改善')}</div>
          <div class="kpi-card" style="--acc:#7c3aed"><div class="kpi-label">封鎖率</div><div class="kpi-val" style="font-size:22px">${ln.blockRate!=null?ln.blockRate+'%':'-'}</div>${badge((ln.blockRate||99)<5,'低封鎖','需注意')}</div>
        </div>`}
      </div>${nextHint()}
    </section>

    <!-- S6 總結 -->
    <section class="slide-section content-section" id="s6">
      <div class="slide-hd">
        <div class="slide-tag">SLIDE 7 · 綜合總結</div>
        <h2><div class="red-acc"></div>當期成果與改善建議</h2>
        <div class="slide-period">${label} 匯報總結</div>
      </div>
      <div class="slide-body">
        <div class="ai-wrap">
          <div class="ai-hd">★ AI 分析結果</div>
          <div class="ai-body">
            <div class="ai-block"><div class="ai-tag" style="background:#dcfce7;color:#16a34a">★ 優良成果</div><div class="ai-text">${ai.achievements?richText(ai.achievements):'（未產生）'}</div></div>
            <div class="ai-block"><div class="ai-tag" style="background:#fef3c7;color:#d97706">⚠ 建議改善</div><div class="ai-text">${ai.improvements?richText(ai.improvements):'（未產生）'}</div></div>
            <div class="ai-block"><div class="ai-tag" style="background:#dbeafe;color:#1d4ed8">📋 其他事項</div><div class="ai-text">${ai.notes?richText(ai.notes):'（未產生）'}</div></div>
          </div>
        </div>
        ${note?`<div class="ai-wrap"><div class="ai-hd">📝 主任補充說明</div><div class="ai-body"><div class="note-box">${richText(note)}</div></div></div>`:''}
      </div>
    </section>

    <!-- Footer -->
    <footer class="rpt-footer">
      <div class="footer-logo">
        <img src="${LOGO_SRC}" alt="MG">
        <span>銘勁汽車股份有限公司 · 顧客關係部 · 內部文件</span>
      </div>
      <span>此為靜態匯報頁面，可直接上傳至 SharePoint 以網址形式分享</span>
    </footer>
  `;

  // Intersection Observer — 捲動時自動 highlight nav
  const sections = document.querySelectorAll('.slide-section');
  const tabs = document.querySelectorAll('.nav-tab');
  const obs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const id=e.target.id;
        tabs.forEach(t=>t.classList.toggle('active',t.getAttribute('href')==='#'+id));
      }
    });
  },{threshold:0.3,rootMargin:'-52px 0px 0px 0px'});
  sections.forEach(s=>obs.observe(s));
}

function setActive(el){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}

buildReport();
</script>
</body>
</html>
