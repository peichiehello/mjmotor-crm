
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG 試乘滿意度戰情室</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mg: { red: '#b91c1c', darkred: '#991b1b', gray: '#111827', lightbg: '#f8fafc' }
                    }
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/recharts@2.10.4/umd/Recharts.js"></script>

    <style>
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background-color: #f8fafc; }
        /* 方案 A 頁面標題區 */
        .page-header { background: white; border-bottom: 1px solid #e5e7eb; padding: 14px 24px; position: sticky; top: 0; z-index: 50; }
        .page-header .breadcrumb { font-size: 11px; color: #9ca3af; margin-bottom: 6px; }
        .page-header .title-row { display: flex; align-items: flex-start; gap: 10px; }
        .page-header .red-accent { width: 3px; min-height: 22px; background: #b91c1c; border-radius: 2px; margin-top: 2px; flex-shrink: 0; }
        .page-header h1 { font-size: 17px; font-weight: 600; color: #111827; line-height: 1.3; margin: 0; }
        .page-header .subtitle { font-size: 12px; color: #6b7280; margin-top: 2px; }
        .page-header .toolbar { display: flex; align-items: center; gap: 8px; margin-top: 10px; margin-left: 13px; flex-wrap: wrap; }
        .page-header .action-btn { font-size: 12px; padding: 4px 12px; border-radius: 6px; border: 1px solid #e5e7eb; background: #f9fafb; color: #374151; cursor: pointer; font-family: inherit; }
        .page-header .action-btn.danger { border-color: #fca5a5; background: #fff5f5; color: #b91c1c; }
        .page-header select { font-size: 12px; padding: 4px 8px; border-radius: 6px; border: 1px solid #e5e7eb; background: #f9fafb; color: #374151; font-family: inherit; cursor: pointer; }
        .page-header .file-badge { font-size: 11px; padding: 3px 8px; border-radius: 6px; background: #dcfce7; color: #166534; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .sticky-col-1 { position: sticky; left: 0; z-index: 10; background-color: white; border-right: 2px solid #e5e7eb; }
        .sticky-col-2 { position: sticky; left: 120px; z-index: 10; background-color: #fef2f2; border-right: 2px solid #fca5a5; }
        .projector-card { border: 1px solid #e2e8f0; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); background-color: white; }
        
        /* 固定表格欄寬 */
        .rank-col { width: 80px; min-width: 80px; }
        .name-col { width: 200px; min-width: 200px; }
        .plant-col { width: 150px; min-width: 150px; }
        .count-col { width: 100px; min-width: 100px; }
        .score-col { width: 120px; min-width: 120px; }
        .rate-col { width: 120px; min-width: 120px; }
        .status-col { width: 120px; min-width: 120px; }
        
        /* 明細表樣式 */
        .sticky-col { position: sticky; left: 0; z-index: 10; background-color: white; border-right: 2px solid #e5e7eb; min-width: 60px; }
        .detail-table { border-collapse: collapse; width: 100%; font-size: 0.8rem; }
        .detail-table th, .detail-table td { border: 1px solid #e5e7eb; padding: 6px 10px; text-align: center; }
        .detail-table th { background-color: #f1f5f9; font-weight: 600; font-size: 0.75rem; }
        .plant-header { background-color: #dbeafe; font-weight: bold; text-align: left; font-size: 0.85rem; }
        .subtotal-row { background-color: #fef3c7; font-weight: 600; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [data, setData] = React.useState({
                dealerRanking: [],
                plantRanking: [],
                salespeople: [],
                lowScoreCases: [],
                scoreDistribution: { s10: 0, s98: 0, s96: 0, s90: 0, below90: 0 },
                detailData: { salesByPlant: {} }, // 新增：明細表資料
                fileName: '', // 新增：檔案名稱
                lastUpdated: '尚未上傳資料'
            });
            const [selectedView, setSelectedView] = React.useState('全廠區');
            const [showUploadModal, setShowUploadModal] = React.useState(false);
            const [uploadStatus, setUploadStatus] = React.useState('');
            const [isUploading, setIsUploading] = React.useState(false);
            const [errorMessage, setErrorMessage] = React.useState('');
            const [storageStatus, setStorageStatus] = React.useState('');

            // 驗證資料結構
            const validateData = (data) => {
                try {
                    if (!data) return false;
                    if (!Array.isArray(data.dealerRanking)) return false;
                    if (!Array.isArray(data.plantRanking)) return false;
                    if (!Array.isArray(data.salespeople)) return false;
                    if (!Array.isArray(data.lowScoreCases)) return false;
                    if (!data.scoreDistribution) return false;
                    return true;
                } catch (e) {
                    return false;
                }
            };

            // 初始化 - 從 localStorage 載入
            React.useEffect(() => {
                try {
                    const saved = localStorage.getItem('trial_sales_data');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (validateData(parsed)) {
                            setData(parsed);
                            setStorageStatus('loaded');
                            setTimeout(() => setStorageStatus(''), 3000);
                            return;
                        }
                    }
                    setData(generateMockData());
                } catch (error) {
                    console.error('載入失敗:', error);
                    setData(generateMockData());
                }
            }, []);

            // 上傳處理
            const handleUpload = async (file) => {
                if (!file) return;
                setIsUploading(true);
                setUploadStatus('📊 正在解析 SSI 資料...');
                setErrorMessage('');

                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const wb = XLSX.read(e.target.result, { type: 'array' });
                        
                        // 檢查必要的工作表
                        if (!wb.Sheets['成績總表']) {
                            throw new Error('找不到工作表「成績總表」，請確認 Excel 檔案是否正確');
                        }
                        if (!wb.Sheets['報表(成功)']) {
                            throw new Error('找不到工作表「報表(成功)」，請確認 Excel 檔案是否正確');
                        }

                        // 解析成績總表（經銷商和營業所排名）
                        const summarySheet = XLSX.utils.sheet_to_json(wb.Sheets['成績總表'], { header: 1 });
                        const summaryData = parseDealerData(summarySheet);
                        
                        if (!summaryData.dealerRanking || summaryData.dealerRanking.length === 0) {
                            throw new Error('無法解析經銷商資料，請檢查「成績總表」工作表格式');
                        }
                        
                        // 解析報表(成功)（銷售顧問詳細統計）
                        const detailSheet = XLSX.utils.sheet_to_json(wb.Sheets['報表(成功)'], { header: 1 });
                        const detailData = parseDetailData(detailSheet);
                        
                        // 新增：解析明細表資料
                        const trialDetailData = parseTrialDetailData(detailSheet);
                        
                        const newData = {
                            dealerRanking: summaryData.dealerRanking,
                            plantRanking: summaryData.plantData || [],  // 全國營業所排名
                            salespeople: detailData.salespeople || [],
                            lowScoreCases: detailData.lowScoreCases || [],
                            scoreDistribution: detailData.scoreDistribution || { s10: 0, s98: 0, s96: 0, s90: 0, below90: 0 },
                            detailData: { salesByPlant: trialDetailData }, // 新增：明細表資料
                            fileName: file.name, // 新增：儲存檔案名稱
                            lastUpdated: new Date().toLocaleString('zh-TW')
                        };

                        // 驗證資料
                        if (!validateData(newData)) {
                            throw new Error('資料驗證失敗，請確認 Excel 格式是否正確');
                        }

                        setData(newData);
                        setStorageStatus('saving');
                        try {
                            localStorage.setItem('trial_sales_data', JSON.stringify(newData));
                            // 匯報 localStorage 寫入
                            const nowD = new Date();
                            const yr = nowD.getFullYear().toString();
                            const mo = String(nowD.getMonth()+1).padStart(2,'0');
                            const mjDealer = newData.dealerRanking?.find(d => d.name?.includes('銘勁'));
                            const mjRank = newData.dealerRanking?.findIndex(d => d.name?.includes('銘勁')) + 1;
                            const mjPlants = newData.plantRanking?.filter(p => p.dealer?.includes('銘勁'));
                            const dist = newData.scoreDistribution || {};
                            const total = (dist.s10||0)+(dist.s98||0)+(dist.s96||0)+(dist.s90||0)+(dist.below90||0);
                            const satisfyCount = (dist.s10||0)+(dist.s98||0)+(dist.s96||0)+(dist.s90||0);
                            localStorage.setItem(`mj_testdrive_${yr}_${mo}`, JSON.stringify({
                                year: yr, month: mo,
                                score: mjDealer?.avg ? +mjDealer.avg.toFixed(2) : null,
                                rank: mjRank || null,
                                totalDealers: newData.dealerRanking?.length || null,
                                sampleCount: total,
                                satisfyRate: total > 0 ? +((satisfyCount/total)*100).toFixed(1) : null,
                                scoreDistribution: dist,
                                plantScores: mjPlants?.map(p=>({name:p.name, score:p.avg?+p.avg.toFixed(2):null})) || [],
                                updatedAt: new Date().toISOString()
                            }));
                            setStorageStatus('saved');
                            setTimeout(() => setStorageStatus(''), 3000);
                        } catch(e) { setStorageStatus('error'); }
                        setUploadStatus(`✅ 成功上傳 ${summaryData.dealerRanking.length} 家經銷商、${summaryData.plantData.length} 個營業所、${detailData.salespeople.length} 位銷售顧問資料`);
                        setIsUploading(false);
                        setTimeout(() => {
                            setUploadStatus('');
                            setShowUploadModal(false);
                        }, 3000);
                    } catch (err) {
                        console.error('上傳錯誤:', err);
                        setUploadStatus('❌ ' + err.message);
                        setErrorMessage(err.message);
                        setIsUploading(false);
                    }
                };
                
                reader.onerror = () => {
                    setUploadStatus('❌ 檔案讀取失敗，請重試');
                    setErrorMessage('檔案讀取失敗，請確認檔案未損毀');
                    setIsUploading(false);
                };
                
                reader.readAsArrayBuffer(file);
            };

            // 解析試乘成績總表（經銷商和營業所排名）
            const parseDealerData = (jsonData) => {
                const dealerStats = {};
                const plantData = [];
                let currentDealer = '';

                // Step 1：從第3列（index 2）標題列，掃描 C~N 欄（index 2~13）
                // 找最後一個「包含月字」且對應資料列有數字的欄位（即最新月份）
                const headerRow = jsonData[2] || [];
                let latestMonthCol = -1;
                for (let col = 2; col <= 13; col++) {
                    const cell = headerRow[col];
                    if (cell === null || cell === undefined) continue;
                    const label = cell.toString().trim();
                    // 必須包含「月」字才算月份欄
                    if (!label.includes('月')) continue;
                    // 確認資料區（第4列起）至少有一列此欄有數字
                    const hasData = jsonData.slice(3, Math.min(10, jsonData.length))
                        .some(r => r && !isNaN(parseFloat(r[col])));
                    if (hasData) latestMonthCol = col;
                }
                if (latestMonthCol === -1) latestMonthCol = 4; // fallback: E欄(3月)
                const latestMonthLabel = headerRow[latestMonthCol] ? headerRow[latestMonthCol].toString().trim() : '';
                console.log(`最新月份欄位: index=${latestMonthCol}, 標題="${latestMonthLabel}"`);

                // Step 2：逐列讀取資料（第4列 index 3 ~ 第31列 index 30，31列後為其他滿意度）
                for (let i = 3; i <= Math.min(30, jsonData.length - 1); i++) {
                    const row = jsonData[i];
                    if (!row || row.length < 5) continue;

                    const 經銷商原始 = row[0];  // A欄
                    const 營業所 = row[1];      // B欄
                    const 最新月分數 = parseFloat(row[latestMonthCol]);  // 最新月份欄
                    const 服務態度 = parseFloat(row[17]);  // R欄
                    const 專業度   = parseFloat(row[18]);  // S欄

                    // Debug前5筆資料列
                    if (i < 8) console.log(`data row[${i}]: 經銷商=${JSON.stringify(經銷商原始)}, 營業所=${JSON.stringify(營業所)}, 最新月分數=${最新月分數}, R服務態度=${服務態度}, S專業度=${專業度}`);
                    
                    // 跳過無效資料和總計列
                    if (!營業所 || 營業所.toString().includes('總計')) continue;
                    if (isNaN(最新月分數)) continue;

                    // 更新當前經銷商（A欄有值且非空時才更新）
                    if (經銷商原始 !== null && 經銷商原始 !== undefined) {
                        const 經銷商 = 經銷商原始.toString().trim();
                        if (經銷商 !== '' && !經銷商.includes('DLR')) {
                            currentDealer = 經銷商;
                        }
                    }

                    // 必須有經銷商名稱才處理
                    if (!currentDealer || currentDealer === '') continue;

                    // Step 3：計算該營業所平均分數
                    // 若 R/S 欄有值，取 (最新月分數 + 服務態度 + 專業度) / 3
                    // 否則只用最新月分數
                    let avg;
                    const has服務態度 = !isNaN(服務態度);
                    const has專業度   = !isNaN(專業度);
                    if (has服務態度 && has專業度) {
                        avg = (最新月分數 + 服務態度 + 專業度) / 3;
                    } else {
                        avg = 最新月分數;
                    }

                    // 營業所資料
                    plantData.push({
                        dealer: currentDealer,
                        name: 營業所.toString().trim(),
                        avg: avg,
                        整體滿意度: 最新月分數,
                        服務態度: has服務態度 ? 服務態度 : null,
                        專業度:   has專業度   ? 專業度   : null,
                        latestMonth: latestMonthLabel
                    });

                    // 經銷商統計
                    if (!dealerStats[currentDealer]) {
                        dealerStats[currentDealer] = { 
                            name: currentDealer, 
                            總分: 0, 
                            count: 0 
                        };
                    }
                    dealerStats[currentDealer].總分 += avg;
                    dealerStats[currentDealer].count++;
                }

                // 整理經銷商排名（依各營業所平均的算術平均）
                const dealerRanking = Object.values(dealerStats).map(d => ({
                    name: d.name,
                    avg: d.count > 0 ? d.總分 / d.count : 0,
                    total: d.count,
                    passed: d.count,
                    passRate: 100
                })).sort((a, b) => b.avg - a.avg);
                
                dealerRanking.forEach((d, i) => d.rank = i + 1);

                // 整理營業所排名（全國，依 avg 排序）
                plantData.sort((a, b) => b.avg - a.avg);
                plantData.forEach((p, i) => {
                    p.rank = i + 1;
                    p.total = 1;
                    p.passed = 1;
                    p.passRate = 100;
                });

                console.log(`解析完成：${dealerRanking.length} 家經銷商, ${plantData.length} 個營業所`);
                return { dealerRanking, plantData };
            };

            // 解析油車&電車-分數表（營業所、銷售顧問、低分案件）
            const parseDetailData = (jsonData) => {
                const salesStats = {};
                const sopStats = {};
                const scoreDistribution = { s10: 0, s98: 0, s96: 0, s90: 0, below90: 0 };

                // 從第 3 列開始讀取（索引 2）
                for (let i = 2; i < jsonData.length; i++) {
                    const row = jsonData[i];
                    if (!row || row.length < 38) continue;

                    const 填寫狀態 = row[3];  // D欄
                    const 經銷商名稱 = row[8];  // I欄
                    const 展示中心 = row[10]; // K欄
                    const 試乘日期 = row[11]; // L欄
                    const 業代姓名 = row[13]; // N欄
                    const Q1 = row[18]; // S欄 - 前1日提醒
                    const Q3 = row[20]; // U欄 - 說明注意事項
                    const Q4 = row[21]; // V欄 - 說明行駛路線
                    const Q5 = parseFloat(row[22]); // W欄 - 駕駛感受
                    const Q6 = parseFloat(row[23]); // X欄 - 車輛配備
                    const Q9 = parseFloat(row[32]); // AG欄 - 服務態度
                    const Q11 = parseFloat(row[34]); // AI欄 - 專業度
                    const 滿意度分數 = parseFloat(row[36]); // AK欄

                    // 只處理已完成且是銘勁的資料
                    if (填寫狀態 !== '已完成' || 經銷商名稱 !== '銘勁汽車') continue;
                    if (isNaN(滿意度分數)) continue;

                    // 銷售顧問統計
                    if (業代姓名 && 展示中心) {
                        const key = `${展示中心}-${業代姓名}`;
                        if (!salesStats[key]) {
                            salesStats[key] = { 
                                name: 業代姓名, 
                                plant: 展示中心,
                                Q1_是: 0,
                                Q1_總數: 0,
                                Q3_是: 0,
                                Q3_總數: 0,
                                Q4_是: 0,
                                Q4_總數: 0,
                                Q5_分數: [],
                                Q6_分數: [],
                                Q9_分數: [],
                                Q11_分數: [],
                                滿意度_分數: [],
                                count: 0
                            };
                        }
                        
                        const stats = salesStats[key];
                        stats.count++;
                        
                        // Q1-Q4 統計（是/否）
                        if (Q1 === '是') stats.Q1_是++;
                        stats.Q1_總數++;
                        if (Q3 === '是') stats.Q3_是++;
                        stats.Q3_總數++;
                        if (Q4 === '是') stats.Q4_是++;
                        stats.Q4_總數++;
                        
                        // Q5-Q11 分數統計
                        if (!isNaN(Q5)) stats.Q5_分數.push(Q5);
                        if (!isNaN(Q6)) stats.Q6_分數.push(Q6);
                        if (!isNaN(Q9)) stats.Q9_分數.push(Q9);
                        if (!isNaN(Q11)) stats.Q11_分數.push(Q11);
                        stats.滿意度_分數.push(滿意度分數);
                    }

                    // 分數分布統計
                    if (滿意度分數 === 10.0) scoreDistribution.s10++;
                    else if (滿意度分數 >= 9.8) scoreDistribution.s98++;
                    else if (滿意度分數 >= 9.6) scoreDistribution.s96++;
                    else if (滿意度分數 >= 9.0) scoreDistribution.s90++;
                    else scoreDistribution.below90++;
                }

                // 整理銷售顧問資料
                const salespeople = Object.values(salesStats).map(s => {
                    const avg = arr => arr.length > 0 ? arr.reduce((a,b)=>a+b,0) / arr.length : 0;
                    return {
                        name: s.name,
                        plant: s.plant,
                        count: s.count,
                        Q1: s.Q1_總數 > 0 ? (s.Q1_是 / s.Q1_總數 * 100).toFixed(0) + '%' : 'N/A',
                        Q3: s.Q3_總數 > 0 ? (s.Q3_是 / s.Q3_總數 * 100).toFixed(0) + '%' : 'N/A',
                        Q4: s.Q4_總數 > 0 ? (s.Q4_是 / s.Q4_總數 * 100).toFixed(0) + '%' : 'N/A',
                        Q5: avg(s.Q5_分數).toFixed(2),
                        Q6: avg(s.Q6_分數).toFixed(2),
                        Q9: avg(s.Q9_分數).toFixed(2),
                        Q11: avg(s.Q11_分數).toFixed(2),
                        avg: avg(s.滿意度_分數)
                    };
                }).sort((a, b) => b.avg - a.avg);

                return {
                    plantRanking: [],  // 營業所從成績總表來
                    salespeople,
                    lowScoreCases: [],
                    scoreDistribution
                };
            };

            // 解析 SSI 資料
            const parseSSIData = (jsonData) => {
                const dealerStats = {};
                const plantStats = {};
                const salesStats = {};
                const lowScoreCases = [];  // 低分案件
                const scoreDistribution = { s10: 0, s98: 0, s96: 0, s90: 0, below90: 0 };  // 分數分布

                for (let i = 4; i < jsonData.length; i++) {
                    const row = jsonData[i];
                    if (row[3] !== '已完成') continue;

                    const 經銷商別 = row[8] || 'M';
                    
                    // 經銷商代碼對應表
                    const dealerMap = {
                        'M': '銘勁汽車',
                        'R': '榮佑',
                        'J': '茂豐',
                        'Z': '東正',
                        'Y': '億和',
                        'F': '豐展',
                        'S': '順怡'
                    };
                    
                    const 經銷商名稱 = dealerMap[經銷商別] || `經銷商${經銷商別}`;
                    const 營業所 = row[11] || '';
                    const 銷售顧問 = row[18] || '';
                    const 客戶姓名 = row[15] || '';
                    const 交車日期 = row[6] || '';
                    const JDP分數 = parseFloat(row[7]) || 0;  // H欄 = 索引7

                    // 分數分布統計
                    if (JDP分數 === 10.0) scoreDistribution.s10++;
                    else if (JDP分數 >= 9.8) scoreDistribution.s98++;
                    else if (JDP分數 >= 9.6) scoreDistribution.s96++;
                    else if (JDP分數 >= 9.0) scoreDistribution.s90++;
                    else scoreDistribution.below90++;

                    // 收集低分案件 (< 9.6)
                    if (經銷商別 === 'M' && JDP分數 < 9.6) {
                        lowScoreCases.push({
                            客戶姓名,
                            銷售顧問,
                            營業所,
                            交車日期,
                            JDP分數
                        });
                    }

                    // 經銷商統計
                    if (!dealerStats[經銷商名稱]) {
                        dealerStats[經銷商名稱] = { name: 經銷商名稱, total: 0, sum: 0, passed: 0 };
                    }
                    dealerStats[經銷商名稱].total++;
                    dealerStats[經銷商名稱].sum += JDP分數;
                    if (JDP分數 >= 9.6) dealerStats[經銷商名稱].passed++;

                    // 營業所統計 (僅銘勁)
                    if (經銷商別 === 'M') {
                        if (!plantStats[營業所]) {
                            plantStats[營業所] = { name: 營業所, total: 0, sum: 0, passed: 0 };
                        }
                        plantStats[營業所].total++;
                        plantStats[營業所].sum += JDP分數;
                        if (JDP分數 >= 9.6) plantStats[營業所].passed++;

                        // 銷售顧問統計
                        const key = `${營業所}-${銷售顧問}`;
                        if (!salesStats[key]) {
                            salesStats[key] = { name: 銷售顧問, plant: 營業所, scores: [], count: 0 };
                        }
                        salesStats[key].scores.push(JDP分數);
                        salesStats[key].count++;
                    }
                }

                // 整理經銷商排名
                const dealerRanking = Object.values(dealerStats).map(d => ({
                    name: d.name,
                    avg: d.total > 0 ? d.sum / d.total : 0,
                    passRate: d.total > 0 ? (d.passed / d.total) * 100 : 0,
                    total: d.total,
                    passed: d.passed
                })).sort((a, b) => b.avg - a.avg);

                // 整理營業所排名
                const plantRanking = Object.values(plantStats).map(p => ({
                    name: p.name,
                    avg: p.total > 0 ? p.sum / p.total : 0,
                    passRate: p.total > 0 ? (p.passed / p.total) * 100 : 0,
                    total: p.total,
                    passed: p.passed
                })).sort((a, b) => b.avg - a.avg);

                // 整理銷售顧問
                const salespeople = Object.values(salesStats).map(s => ({
                    name: s.name,
                    plant: s.plant,
                    count: s.count,
                    avg: s.scores.reduce((a, b) => a + b, 0) / s.count
                })).sort((a, b) => b.avg - a.avg);

                // 低分案件排序 (由低到高)
                lowScoreCases.sort((a, b) => a.JDP分數 - b.JDP分數);

                // 加入排名欄位
                dealerRanking.forEach((d, i) => d.rank = i + 1);
                plantRanking.forEach((p, i) => p.rank = i + 1);

                return { 
                    dealerRanking, 
                    plantRanking, 
                    salespeople,
                    lowScoreCases,
                    scoreDistribution
                };
            };

            // 新增：明細表資料解析函數
            const parseTrialDetailData = (jsonData) => {
                const plantGroups = {};
                
                // 組織架構定義
                const orgStructure = {
                    '中壢營業所': {
                        '所長': ['楊珈忻'],
                        '課長': ['李詮瑋', '林祐生'],
                        '李詮瑋': ['宋美琳', '陳冠旻', '陳友正', '周呈儒', '邱玉華'],
                        '林祐生': ['邱垂傑', '余育誠', '李秋燕', '許曉琪', '曾健軒']
                    },
                    '八德營業所': {
                        '所長': ['林猷安'],
                        '課長': ['孔秋萍', '林柏毅'],
                        '孔秋萍': ['林詩惟', '王淳安', '鄧霖駿'],
                        '林柏毅': ['陳昭翰', '陳奕瑜']
                    },
                    '桃園營業所': {
                        '所長': ['蕭凱升'],
                        '課長': ['傅堃棋'],
                        '傅堃棋': ['高永霖', '李敬平', '劉臻', '王耀慶']
                    }
                };

                // 從第 3 列開始讀取
                for (let i = 2; i < jsonData.length; i++) {
                    const row = jsonData[i];
                    if (!row || row.length < 37) continue;

                    const 填寫狀態 = row[3];
                    const 經銷商名稱 = row[8];
                    const 展示中心 = row[10];
                    const 業代姓名 = row[13];
                    const Q1 = row[18];
                    const Q2 = row[19];
                    const Q3 = row[20];
                    const Q4 = row[21];
                    const Q5 = parseFloat(row[22]);
                    const Q6 = parseFloat(row[23]);
                    const Q9 = parseFloat(row[32]);
                    const Q11 = parseFloat(row[34]);
                    const 滿意度分數 = parseFloat(row[36]);

                    if (填寫狀態 !== '已完成' || 經銷商名稱 !== '銘勁汽車') continue;
                    if (!業代姓名 || !展示中心) continue;

                    // 強化清理：移除所有空格（包含全形空格）並統一命名
                    const 營業所 = 展示中心
                        .replace(/\s+/g, '')  // 移除所有空格（半形+全形）
                        .replace('展示中心', '營業所')
                        .replace('營業所', '營業所');  // 確保統一
                    
                    const 清理後姓名 = 業代姓名
                        .replace(/\s+/g, '')  // 移除所有空格（半形+全形）
                        .trim();

                    if (!plantGroups[營業所]) {
                        plantGroups[營業所] = {};
                    }

                    if (!plantGroups[營業所][清理後姓名]) {
                        plantGroups[營業所][清理後姓名] = {
                            name: 清理後姓名,
                            plant: 營業所,
                            Q1: [], Q2: [], Q3: [], Q4: [], Q5: [], Q6: [], Q9: [], Q11: [], 滿意度: []
                        };
                    }

                    const stats = plantGroups[營業所][清理後姓名];
                    stats.Q1.push(Q1);
                    stats.Q2.push(Q2);
                    stats.Q3.push(Q3);
                    stats.Q4.push(Q4);
                    if (!isNaN(Q5)) stats.Q5.push(Q5);
                    if (!isNaN(Q6)) stats.Q6.push(Q6);
                    if (!isNaN(Q9)) stats.Q9.push(Q9);
                    if (!isNaN(Q11)) stats.Q11.push(Q11);
                    if (!isNaN(滿意度分數)) stats.滿意度.push(滿意度分數);
                }

                // 判斷職級
                const getRole = (營業所, 姓名) => {
                    const org = orgStructure[營業所];
                    if (!org) return '銷售顧問';
                    if (org['所長'] && org['所長'].includes(姓名)) return '所長';
                    if (org['課長'] && org['課長'].includes(姓名)) return '課長';
                    return '銷售顧問';
                };

                // 判斷所屬課長
                const getManager = (營業所, 姓名) => {
                    const org = orgStructure[營業所];
                    if (!org) return null;
                    for (const manager of (org['課長'] || [])) {
                        if (org[manager] && org[manager].includes(姓名)) {
                            return manager;
                        }
                    }
                    return null;
                };

                // 整理每個營業所的資料
                const result = {};
                for (const [營業所, salespeople] of Object.entries(plantGroups)) {
                    const avg = arr => arr.length > 0 ? (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(2) : '-';
                    const countYes = arr => arr.filter(x => x === '是').length;
                    const countClean = arr => arr.filter(x => x === '乾淨且舒適').length;
                    const calcRate = arr => arr.length > 0 ? ((countYes(arr) / arr.length) * 100).toFixed(0) + '%' : '-';
                    const calcRateQ2 = arr => arr.length > 0 ? ((countClean(arr) / arr.length) * 100).toFixed(0) + '%' : '-';

                    const salesList = Object.values(salespeople).map(s => {
                        const role = getRole(營業所, s.name);
                        // Debug: 輸出課長識別結果
                        if (role === '課長') {
                            console.log(`✓ 識別為課長: ${營業所} - ${s.name}`);
                        }
                        return {
                            name: s.name,
                            role: role,
                            manager: getManager(營業所, s.name),
                            Q1: calcRate(s.Q1),
                            Q2: calcRateQ2(s.Q2),
                            Q3: calcRate(s.Q3),
                            Q4: calcRate(s.Q4),
                            Q1_count: countYes(s.Q1),
                            Q2_count: countClean(s.Q2),
                            Q3_count: countYes(s.Q3),
                            Q4_count: countYes(s.Q4),
                            Q5: avg(s.Q5),
                            Q6: avg(s.Q6),
                            Q9: avg(s.Q9),
                            Q11: avg(s.Q11),
                            avg: avg(s.滿意度),
                            total: s.滿意度.length
                        };
                    });

                    // 排序：所長 → 課長及其團隊
                    const org = orgStructure[營業所] || {};
                    const sortedList = [];
                    
                    // Debug: 輸出組織架構和匹配結果
                    console.log(`\n=== ${營業所} 組織架構 ===`);
                    console.log('定義的課長:', org['課長']);
                    console.log('實際讀取的人員:');
                    salesList.forEach(s => {
                        console.log(`  - ${s.name} → ${s.role}`);
                    });
                    console.log('---');

                    // 所長
                    for (const name of (org['所長'] || [])) {
                        const person = salesList.find(s => s.name === name);
                        if (person) sortedList.push(person);
                    }

                    // 課長及其團隊
                    for (const manager of (org['課長'] || [])) {
                        const managerPerson = salesList.find(s => s.name === manager);
                        if (managerPerson) sortedList.push(managerPerson);

                        for (const member of (org[manager] || [])) {
                            const memberPerson = salesList.find(s => s.name === member);
                            if (memberPerson) sortedList.push(memberPerson);
                        }
                    }

                    // 其他未分配的人員
                    for (const person of salesList) {
                        if (!sortedList.find(s => s.name === person.name)) {
                            sortedList.push(person);
                        }
                    }

                    result[營業所] = { name: 營業所, salespeople: sortedList };
                }

                // 按指定順序排序
                const sortedResult = {};
                const order = ['中壢營業所', '八德營業所', '桃園營業所'];
                for (const plant of order) {
                    if (result[plant]) {
                        sortedResult[plant] = result[plant];
                    }
                }
                for (const [plant, data] of Object.entries(result)) {
                    if (!sortedResult[plant]) {
                        sortedResult[plant] = data;
                    }
                }

                return sortedResult;
            };

            // 模擬資料
            const generateMockData = () => {
                // 經銷商 - 根據真實數據

                const plants = [

                // 銷售顧問
                const salesNames = ['周呈儒', '劉臻', '李秋燕', '王耀慶', '陳友正', '林祐生', '余育誠', '邱垂傑'];
                const salespeople = salesNames.map(name => ({

                })).sort((a, b) => b.avg - a.avg);

                // 低分案件
                const lowScoreCases = [
                    { 客戶姓名: '王○明', 銷售顧問: '余育誠', 營業所: '中壢營業所', 交車日期: '2026-02-15', JDP分數: 8.73 },
                    { 客戶姓名: '李○華', 銷售顧問: '邱垂傑', 營業所: '八德營業所', 交車日期: '2026-02-18', JDP分數: 8.87 },
                    { 客戶姓名: '張○芳', 銷售顧問: '陳友正', 營業所: '桃園營業所', 交車日期: '2026-02-22', JDP分數: 8.92 }

                // 分數分布
                const scoreDistribution = {

                return {

                    lastUpdated: '模擬資料 - ' + new Date().toLocaleString('zh-TW')
                };
            };

            // 當前視圖的銷售顧問
            const currentSales = React.useMemo(() => {
                if (selectedView === '全廠區') return data.salespeople;
                return data.salespeople.filter(s => s.plant === selectedView);
            }, [data.salespeople, selectedView]);

            return (
                <div style={{minHeight:"100vh",background:"#f8fafc"}}>
                    {/* 錯誤提示橫幅 */}
                    {errorMessage && (
                        <div className="bg-red-50 border-l-4 border-green-500 p-4 sticky top-0 z-50">
                            <div className="flex items-center justify-between max-w-7xl mx-auto">

                                    <div className="flex-shrink-0">
                                        <svg className="h-5 w-5 text-red-500" viewBox="0 0 20 20" fill="currentColor">
                                            <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd" />

        // 經銷商直向長條圖組件 - 優化版

        // KPI 指標卡片組件 - 淺色版
        function KPICards({ data, threshold }) {
            const totalCases = data.salespeople.reduce((sum, s) => sum + s.count, 0);

                : 0;

            const kpis = [
                { label: '經銷商排名', value: `${dealerRank}/${data.dealerRanking.length}`, icon: '🏆', badge: dealerRank === 1 ? '🥇' : dealerRank === 2 ? '🥈' : dealerRank === 3 ? '🥉' : '' },
                { label: '各所平均', value: avgScore.toFixed(2), icon: '⭐', badge: avgScore >= threshold ? '達標' : '' },
                { label: '本月總份數', value: `${totalCases}份`, icon: '📋', badge: '' },
                { label: '達標人數', value: `${passedPeople}人`, icon: '✓', badge: `${passRate.toFixed(0)}%` },
                { label: '低分案件', value: `${lowScoreCount}件`, icon: '⚠️', badge: lowScoreCount === 0 ? '優秀' : '' },
                { label: '滿分次數', value: `${perfectScores}次`, icon: '🏅', badge: '' },
                { label: '本月趨勢', value: '進步中', icon: '📈', badge: '↑2.1%' }
            ];

            return (
                <div className="bg-white rounded-xl border-2 border-slate-200 shadow-sm">
                    <div className="border-b border-slate-200 px-4 py-3">
                        <h2 className="text-lg font-bold text-slate-800">📈 關鍵指標總覽</h2>

        // 智能分析建議組件 - 淺色版
        function SmartInsights({ data, threshold, selectedView }) {
            const insights = [];

            // 找出低分案件最多的營業所
            const plantLowScores = {};
            data.lowScoreCases.forEach(c => {
                plantLowScores[c.營業所] = (plantLowScores[c.營業所] || 0) + 1;
            });
            const worstPlant = Object.keys(plantLowScores).sort((a, b) => plantLowScores[b] - plantLowScores[a])[0];
            if (worstPlant && plantLowScores[worstPlant] >= 2) {
                const lowSalespeople = data.lowScoreCases
                    .filter(c => c.營業所 === worstPlant)
                    .map(c => c.銷售顧問)
                    .filter((v, i, a) => a.indexOf(v) === i)
                    .join('、');
                insights.push({
                    type: 'warning',
                    title: '本月焦點問題',
                    content: `${worstPlant}低分案件偏多 (${plantLowScores[worstPlant]}件)`,
                    action: `建議加強 ${lowSalespeople} 的培訓`
                });
            }

            // 找出表現優異的人員
            const topPerformers = data.salespeople.filter(s => s.avg === 10.0);
            if (topPerformers.length > 0) {
                insights.push({
                    type: 'success',
                    title: '表現優異',
                    content: `${topPerformers[0].name} 本月平均滿分`,
                    action: '建議表揚並分享成功經驗'
                });
            }

            // 找出零低分的營業所
            const perfectPlants = data.plantRanking.filter(p => {
                const lowCount = data.lowScoreCases.filter(c => c.營業所 === p.name).length;
                return lowCount === 0 && p.total > 0;
            });
            if (perfectPlants.length > 0) {
                insights.push({
                    type: 'success',
                    title: '卓越表現',
                    content: `${perfectPlants[0].name}零低分案件`,
                    action: '可作為標竿分享管理方法'
                });
            }

            // 達標率檢查
            const overallPassRate = data.salespeople.length > 0 
                ? (data.salespeople.filter(s => s.avg >= threshold).length / data.salespeople.length * 100) 
                : 0;
            if (overallPassRate < 80) {
                insights.push({
                    type: 'warning',
                    title: '需要關注',
                    content: `整體達標率 ${overallPassRate.toFixed(0)}% 低於目標`,
                    action: '建議月底前加強衝刺,重點輔導未達標人員'
                });
            }

            // 低分案件總數警示
            if (data.lowScoreCases.length >= 5) {
                insights.push({
                    type: 'info',
                    title: '改善建議',
                    content: `本月共 ${data.lowScoreCases.length} 件低分案件`,
                    action: '建議召開檢討會議,分析共同失分原因'
                });
            }

            if (insights.length === 0) {
                insights.push({
                    type: 'success',
                    title: '表現優異',
                    content: '本月整體表現優秀,無需特別關注事項',
                    action: '繼續保持,穩定優質服務'
                });
            }

            const typeBorders = {
                success: 'border-green-400',
                warning: 'border-orange-400',
                info: 'border-blue-400'
            };

            const typeBgs = {
                success: 'bg-green-50',
                warning: 'bg-orange-50',
                info: 'bg-blue-50'
            };

            const typeIcons = {
                success: '🎯',
                warning: '⚠️',
                info: '💡'
            };

            return (
                <div className="bg-white rounded-xl border-2 border-slate-200 shadow-sm">
                    <div className="border-b border-slate-200 px-4 py-3">
                        <h2 className="text-lg font-bold text-slate-800">🤖 智能分析建議</h2>
                        <p className="text-xs text-slate-500">基於數據自動生成</p>
                    </div>
                    <div className="p-4 space-y-3">
                        {insights.map((insight, i) => (
                            <div key={i} className={`${typeBgs[insight.type]} border-l-4 ${typeBorders[insight.type]} rounded-r-lg p-3`}>
                                <div className="flex items-start gap-2">
                                    <div className="text-xl">{typeIcons[insight.type]}</div>
                                    <div className="flex-1">
                                        <div className="font-bold text-sm text-slate-800 mb-1">{insight.title}</div>
                                        <div className="text-sm text-slate-700 mb-1">• {insight.content}</div>
                                        <div className="text-xs text-slate-600 italic">→ {insight.action}</div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // 圖表為主的排名組件
        function ChartRanking({ title, subtitle, data, colorScheme, chartColor, threshold, onRowClick }) {

                                    cursor={onRowClick ? 'pointer' : 'default'}
                                >
                                    {data.map((entry, index) => (
                                        <Cell 
                                            key={`cell-${index}`} 
                                            fill={entry.avg >= threshold ? '#10b981' : chartColor}
                                        />
                                    ))}
                                    <LabelList 
                                        dataKey="avg" 
                                        position="right"
                                        formatter={(value) => value.toFixed(2)}
                                        style={{fontSize: '14px', fontWeight: 'bold', fill: '#1e293b'}}
                                    />
                                </Bar>
                            </BarChart>
                        </ResponsiveContainer>
                    </div>

                    {/* 補充資訊表格 */}
                    <div className="border-t border-slate-200 bg-white">
                        <table className="w-full text-xs">
                            <thead className="bg-slate-50">
                                <tr>
                                    <th className="rank-col px-3 py-2 text-left font-semibold text-slate-600">排名</th>
                                    <th className="name-col px-4 py-2 text-left font-semibold text-slate-600">名稱</th>
                                    <th className="count-col px-3 py-2 text-center font-semibold text-slate-600">份數</th>
                                    <th className="score-col px-3 py-2 text-center font-semibold text-slate-600">分數</th>
                                    <th className="rate-col px-3 py-2 text-center font-semibold text-slate-600">達標率</th>
                                    <th className="status-col px-3 py-2 text-center font-semibold text-slate-600">達標數</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {data.map((item, i) => (
                                    <tr 
                                        key={i} 
                                        className={`hover:bg-slate-50 ${onRowClick ? 'cursor-pointer' : ''}`}
                                        onClick={() => onRowClick && onRowClick(item)}
                                    >
                                        <td className="rank-col px-3 py-2 font-semibold text-slate-700">
                                            {i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}`}
                                        </td>
                                        <td className="name-col px-4 py-2 font-medium text-slate-800">{item.name}</td>
                                        <td className="count-col px-3 py-2 text-center text-slate-600">{item.total}</td>
                                        <td className="score-col px-3 py-2 text-center">
                                            <span className={`font-bold ${item.avg >= threshold ? 'text-green-600' : 'text-orange-600'}`}>
                                                {item.avg.toFixed(2)}
                                            </span>
                                        </td>
                                        <td className="rate-col px-3 py-2 text-center">
                                            <span className={`font-semibold ${item.passRate >= 80 ? 'text-green-600' : 'text-orange-600'}`}>
                                                {item.passRate.toFixed(1)}%
                                            </span>
                                        </td>
                                        <td className="status-col px-3 py-2 text-center text-slate-600 text-xs">
                                            {item.passed}/{item.total}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // 帶圖表的排名表組件
        function RankingTableWithChart({ title, subtitle, data, colorScheme, chartColor, onRowClick }) {
            const colors = {
                blue: 'from-blue-700 to-blue-600',
                green: 'from-green-700 to-green-600',
                red: 'from-red-700 to-red-600'
            };

            const showChart = data.length <= 7 && typeof Recharts !== 'undefined';

            // Recharts 組件
            const { ResponsiveContainer, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Cell } = 
                typeof Recharts !== 'undefined' ? Recharts : {};

            return (
                <div className="projector-card rounded-xl overflow-hidden">
                    <div className={`bg-gradient-to-r ${colors[colorScheme]} text-white px-6 py-4`}>
                        <h2 className="text-xl font-bold">{title}</h2>
                        <p className="text-sm opacity-90">{subtitle}</p>
                    </div>

                    {/* 圖表區 */}
                    {showChart && (
                        <div className="p-6 bg-slate-50 border-b border-slate-200">
                            <ResponsiveContainer width="100%" height={280}>
                                <BarChart data={data} layout="vertical">
                                    <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                                    <XAxis type="number" domain={[8.5, 10]} tick={{fontSize: 12}} />
                                    <YAxis 
                                        dataKey="name" 
                                        type="category" 
                                        width={120}
                                        tick={{fontSize: 12}}
                                    />
                                    <Tooltip 
                                        contentStyle={{
                                            backgroundColor: 'white',
                                            border: '1px solid #e2e8f0',
                                            borderRadius: '8px',
                                            fontSize: '12px'
                                        }}
                                        formatter={(value) => value.toFixed(2)}
                                    />
                                    <Bar dataKey="avg" name="平均分數" radius={[0, 8, 8, 0]}>
                                        {data.map((entry, index) => (
                                            <Cell 
                                                key={`cell-${index}`} 
                                                fill={entry.avg >= 9.6 ? '#10b981' : chartColor}
                                            />
                                        ))}
                                    </Bar>
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                    )}

                    {/* 表格區 */}
                    <div className="overflow-x-auto">
                        <table className="w-full text-sm">
                            <thead className="bg-slate-50 border-b-2 border-slate-200">
                                <tr>
                                    <th className="rank-col px-4 py-3 text-left font-bold text-slate-700">排名</th>
                                    <th className="name-col px-6 py-3 text-left font-bold text-slate-700">名稱</th>
                                    <th className="count-col px-6 py-3 text-center font-bold text-slate-700">份數</th>
                                    <th className="score-col px-6 py-3 text-center font-bold text-slate-700">平均分數</th>
                                    <th className="rate-col px-6 py-3 text-center font-bold text-slate-700">達標率</th>
                                    <th className="status-col px-6 py-3 text-center font-bold text-slate-700">達標件數</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {data.map((item, i) => (
                                    <tr 
                                        key={i} 
                                        className={`hover:bg-slate-50 ${onRowClick ? 'cursor-pointer' : ''}`}
                                        onClick={() => onRowClick && onRowClick(item)}
                                    >
                                        <td className="rank-col px-4 py-3 font-bold">
                                            {i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}`}
                                        </td>
                                        <td className="name-col px-6 py-3 font-semibold">{item.name}</td>
                                        <td className="count-col px-6 py-3 text-center">{item.total}</td>
                                        <td className="score-col px-6 py-3 text-center">
                                            <span className={`text-lg font-black ${item.avg >= 9.6 ? 'text-green-600' : 'text-orange-600'}`}>
                                                {item.avg.toFixed(2)}
                                            </span>
                                        </td>
                                        <td className="rate-col px-6 py-3 text-center">
                                            <span className={`font-bold ${item.passRate >= 80 ? 'text-green-600' : 'text-orange-600'}`}>
                                                {item.passRate.toFixed(1)}%
                                            </span>
                                        </td>
                                        <td className="status-col px-6 py-3 text-center text-slate-700">
                                            {item.passed} / {item.total}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // Modal
        // 新增：明細表組件
        function DetailTable({ data }) {
            if (!data || !data.salesByPlant || Object.keys(data.salesByPlant).length === 0) {
                return (
                    <div className="text-center py-12 text-slate-500">
                        <p className="text-xl mb-2">📊 尚無明細資料</p>
                        <p>請上傳試乘滿意度 Excel 檔案</p>
                    </div>
                );
            }

            return (
                <div className="overflow-x-auto">
                    <table className="detail-table">
                        <thead>
                            <tr>
                                <th className="sticky-col" rowSpan="2">職級</th>
                                <th className="sticky-col" rowSpan="2" style={{left: '60px'}}>姓名</th>
                                <th colSpan="4">是/否題（數量）</th>
                                <th colSpan="4">評分題（平均）</th>
                                <th rowSpan="2">滿意度<br/>平均</th>
                                <th rowSpan="2">案件數</th>
                            </tr>
                            <tr>
                                <th>Q1<br/>前1日提醒</th>
                                <th>Q2<br/>車輛清潔</th>
                                <th>Q3<br/>注意事項</th>
                                <th>Q4<br/>行駛路線</th>
                                <th>Q5<br/>駕駛感受</th>
                                <th>Q6<br/>車輛配備</th>
                                <th>Q9<br/>服務態度</th>
                                <th>Q11<br/>專業度</th>
                            </tr>
                        </thead>
                        <tbody>
                            {Object.entries(data.salesByPlant).map(([plantName, plantData]) => (
                                <React.Fragment key={plantName}>
                                    <tr className="plant-header">
                                        <td colSpan="12">{plantName}</td>
                                    </tr>
                                    {plantData.salespeople.map((person, idx) => (
                                        <tr key={idx}>
                                            <td className="sticky-col text-center text-xs">{person.role}</td>
                                            <td className="sticky-col text-left font-medium" style={{left: '60px'}}>{person.name}</td>
                                            <td>{person.Q1}</td>
                                            <td>{person.Q2}</td>
                                            <td>{person.Q3}</td>
                                            <td>{person.Q4}</td>
                                            <td>{person.Q5}</td>
                                            <td>{person.Q6}</td>
                                            <td>{person.Q9}</td>
                                            <td>{person.Q11}</td>
                                            <td className="font-bold">{person.avg}</td>
                                            <td>{person.total}</td>
                                        </tr>
                                    ))}
                                    <tr className="subtotal-row">
                                        <td className="sticky-col text-center" colSpan="2">所別小計</td>
                                        <td>{plantData.salespeople.reduce((sum, p) => sum + p.Q1, 0)}</td>
                                        <td>{plantData.salespeople.reduce((sum, p) => sum + p.Q2, 0)}</td>
                                        <td>{plantData.salespeople.reduce((sum, p) => sum + p.Q3, 0)}</td>
                                        <td>{plantData.salespeople.reduce((sum, p) => sum + p.Q4, 0)}</td>
                                        <td colSpan="4">-</td>
                                        <td>-</td>
                                        <td>{plantData.salespeople.reduce((sum, p) => sum + p.total, 0)}</td>
                                    </tr>
                                </React.Fragment>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }

        function UploadModal({ onClose, onUpload, uploadStatus, isUploading }) {
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full">
                        <div className="bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-6 py-4 rounded-t-2xl">
                            <h2 className="text-2xl font-bold">📤 試乘資料上傳</h2>
                        </div>
                        <div className="p-6 space-y-4">
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-2">試乘滿意度月報</label>
                                <input 
                                    type="file" 
                                    accept=".xlsx,.xls" 
                                    onChange={(e) => onUpload(e.target.files[0])} 
                                    disabled={isUploading}
                                    className="w-full px-4 py-2 border-2 border-slate-300 rounded-lg focus:outline-none focus:border-indigo-500"
                                />
                                <p className="text-xs text-slate-500 mt-1">需包含「成績總表」和「報表(成功)」兩個工作表</p>
                            </div>
                            {uploadStatus && (
                                <div className={`p-4 rounded-lg text-sm font-medium ${
                                    uploadStatus.includes('✅') ? 'bg-green-50 text-green-800' :
                                    uploadStatus.includes('❌') ? 'bg-red-50 text-red-800' : 'bg-blue-50 text-blue-800'
                                }`}>{uploadStatus}</div>
                            )}
                        </div>
                        <div className="px-6 py-4 bg-slate-50 rounded-b-2xl flex justify-end">
                            <button
                                onClick={onClose}
                                disabled={isUploading}
                                className="px-6 py-2 bg-slate-600 hover:bg-slate-700 text-white font-bold rounded-lg"
                            >
                                關閉
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // 全域錯誤捕捉
        window.addEventListener('error', (event) => {
            console.error('全域錯誤:', event.error);
            // 避免重複錯誤
            event.preventDefault();
        });

        window.addEventListener('unhandledrejection', (event) => {
            console.error('未處理的 Promise 錯誤:', event.reason);
            event.preventDefault();
        });

        // 使用 ErrorBoundary 包裝 App
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }

            componentDidCatch(error, errorInfo) {
                console.error('React 錯誤:', error, errorInfo);
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen bg-red-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-xl p-8 max-w-lg">
                                <h1 className="text-2xl font-bold text-red-600 mb-4">⚠️ 系統發生錯誤</h1>
                                <p className="text-slate-600 mb-4">系統遇到無法處理的錯誤，請嘗試以下步驟：</p>
                                <ol className="list-decimal list-inside space-y-2 text-slate-700 mb-6">
                                    <li>重新整理頁面（按 F5）</li>
                                    <li>清除瀏覽器快取</li>
                                    <li>如果問題持續，請聯絡技術支援</li>
                                </ol>
                                <button
                                    onClick={() => {
                                        localStorage.clear();
                                        window.location.reload();
                                    }}
                                    className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg"
                                >
                                    清除資料並重新載入
                                </button>
                                {this.state.error && (
                                    <details className="mt-4">
                                        <summary className="text-sm text-slate-500 cursor-pointer">技術細節</summary>
                                        <pre className="mt-2 text-xs bg-slate-100 p-3 rounded overflow-auto">
                                            {this.state.error.toString()}
                                        </pre>
                                    </details>
                                )}
                            </div>
                        </div>
                    );
                }

                return this.props.children;
            }
        }

        // 等待所有庫載入完成
        function initApp() {
            // 檢查必要的庫
            if (typeof React === 'undefined') {
                console.error('React 未載入');
                document.body.innerHTML = '<div style="padding:20px;text-align:center;"><h1>React 載入失敗</h1><button onclick="location.reload()">重新載入</button></div>';
                return;
            }
            if (typeof ReactDOM === 'undefined') {
                console.error('ReactDOM 未載入');
                document.body.innerHTML = '<div style="padding:20px;text-align:center;"><h1>ReactDOM 載入失敗</h1><button onclick="location.reload()">重新載入</button></div>';
                return;
            }
            if (typeof XLSX === 'undefined') {
                console.error('XLSX 未載入');
                document.body.innerHTML = '<div style="padding:20px;text-align:center;"><h1>Excel 處理庫載入失敗</h1><button onclick="location.reload()">重新載入</button></div>';
                return;
            }
            
            // Recharts 可選（有備用顯示）
            if (typeof Recharts === 'undefined') {
                console.warn('Recharts 未載入，圖表功能將受限');
            }

            // 所有庫都就緒，開始渲染
            ReactDOM.createRoot(document.getElementById('root')).render(
                <ErrorBoundary>
                    <App />
                </ErrorBoundary>
            );
        }

        // 等待 DOM 和所有 script 載入完成
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>
</html>
