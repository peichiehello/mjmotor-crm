<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>銘勁汽車 CSI 戰情室</title>
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.10.4/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI','Microsoft JhengHei',sans-serif; background:#f3f4f6; margin:0; padding:0; }
    .page-header { background:white; border-bottom:1px solid #e5e7eb; padding:14px 24px; position:sticky; top:0; z-index:50; }
    .page-header .breadcrumb { font-size:11px; color:#9ca3af; margin-bottom:6px; }
    .page-header .title-row { display:flex; align-items:flex-start; gap:10px; }
    .page-header .red-accent { width:3px; min-height:22px; background:#b91c1c; border-radius:2px; margin-top:2px; flex-shrink:0; }
    .page-header h1 { font-size:17px; font-weight:600; color:#111827; line-height:1.3; margin:0; }
    .page-header .subtitle { font-size:12px; color:#6b7280; margin-top:2px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer,
            RadarChart, Radar, PolarGrid, PolarAngleAxis, PolarRadiusAxis,
            LineChart, Line, ReferenceLine, Cell, PieChart, Pie } = window.Recharts;

    // SVG Icon components
    const AlertTriangle = ({size=16,color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
    const MapPin = ({size=16,color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
    const CheckCircle2 = ({size=16,color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
    const Medal = ({size=16,color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="17" r="5"/><path d="M7.21 15 2.66 7.14a2 2 0 0 1 .13-2.2L4.4 2.8A2 2 0 0 1 6 2h12a2 2 0 0 1 1.6.8l1.6 2.14a2 2 0 0 1 .14 2.2L16.79 15"/></svg>;
    const LayoutDashboard = ({size=16,color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>;
    const Upload = ({size=16,color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
    const FileSpreadsheet = ({size=16,color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>;
    const Phone = ({size=16,color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.35 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 5.99 5.99l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
    const Wrench = ({size=16,color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>;
    const UserCheck = ({size=16,color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg>;

    const FACTORY_THEME = {
      "中壢廠": { hd:"#eff6ff", hdBorder:"#bfdbfe", hdText:"#1e3a8a", accent:"#2563eb" },
      "八德廠": { hd:"#f5f3ff", hdBorder:"#ddd6fe", hdText:"#3730a3", accent:"#7c3aed" },
    };
    const MGT_Q = { Q2:97.3, Q3:96.6, Q4:97.3, Q5:96.4, Q6:96.5, Q7:97.6, Q8:97.1, Q9:96.7, Q10:96.2, Q11:96.6 };
    const ALL_Q_KEYS = ["Q2","Q3","Q4","Q5","Q6","Q7","Q8","Q9","Q10","Q11"];
    const Q_LABELS = { Q2:"立即接待", Q3:"需求確認", Q4:"取車時間", Q5:"費用說明", Q6:"進度告知", Q7:"飲料點心", Q8:"準時完修", Q9:"一次修好", Q10:"車輛清潔", Q11:"整體滿意" };
    const ADV_RESP  = ["Q2","Q3","Q4","Q5","Q6","Q10"];
    const TECH_RESP = ["Q8","Q9"];
    const WEEKLY_DEF = [
      { w:"1-1週", M:825, BD:974, ZL:766, MGT:913 },
      { w:"1-2週", M:900, BD:981, ZL:861, MGT:911 },
      { w:"1-3週", M:953, BD:987, ZL:934, MGT:937 },
      { w:"1-4週", M:964, BD:961, ZL:965, MGT:930 },
      { w:"1-5週", M:942, BD:846, ZL:990, MGT:920 },
      { w:"2-1週", M:982, BD:959, ZL:991, MGT:934 },
      { w:"2-2週", M:935, BD:901, ZL:951, MGT:933 },
      { w:"2-3週", M:938, BD:805, ZL:989, MGT:938 },
      { w:"3-1週", M:925, BD:844, ZL:951, MGT:926 },
      { w:"3-2週", M:924, BD:889, ZL:940, MGT:882 },
      { w:"3-3週", M:911, BD:889, ZL:917, MGT:900 },
    ];

    function parseNum(v) { const n = parseFloat(v); return isNaN(n) ? null : n; }
    function calcAlerts(data, key) {
      const alerts = {}; let streak = 0;
      data.forEach((d, i) => { if (d[key]!==undefined && d[key]<910) streak++; else streak=0; if (streak>=2) alerts[i]=true; });
      return alerts;
    }
    function loadXLSX() {
      return new Promise((res, rej) => {
        if (window.XLSX) { res(window.XLSX); return; }
        const s = document.createElement("script");
        s.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
        s.onload = () => res(window.XLSX); s.onerror = rej;
        document.head.appendChild(s);
      });
    }
    function parseSummarySheet(ws) {
      const rows = window.XLSX.utils.sheet_to_json(ws, {header:1, defval:""});
      const dealers=[]; let mgtScore=null, mgtSamples=null; const mgtQRow={}; const summaryRows=[];
      rows.forEach(row => {
        const code=String(row[0]||"").trim(), region=String(row[1]||"").trim(), branch=String(row[2]||"").trim();
        const samples=parseNum(row[3]), score=parseNum(row[4]);
        if (!["MGT","Y","M","S","F","R","Z","J"].includes(code)) return;
        const qs={}; ALL_Q_KEYS.forEach((q,i)=>{const v=parseNum(row[7+i]); if(v!==null) qs[q]=v;});
        if (code==="MGT"&&!branch) { mgtScore=score; mgtSamples=samples; Object.assign(mgtQRow,qs); return; }
        summaryRows.push({code,region,branch,samples,score,qs});
        if (!branch && !dealers.find(d=>d.code===code)) dealers.push({code,samples,score,isMingJin:code==="M",qs});
      });
      const mBranches=summaryRows.filter(r=>r.code==="M"&&r.branch);
      const mTotal=summaryRows.find(r=>r.code==="M"&&!r.branch&&!r.region);
      const mRegion=summaryRows.find(r=>r.code==="M"&&!r.branch&&r.region);
      return {dealers, mgtScore, mgtSamples, mgtQRow, mBranches, mTotal:mTotal||mRegion};
    }
    function parseDetailSheet(ws) {
      const rows=window.XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      let headerIdx=-1;
      rows.forEach((r,i)=>{if(String(r[6]||"").includes("服務廠名稱")||String(r[2]||"").includes("客戶姓名")) headerIdx=i;});
      const dataStart=headerIdx>=0?headerIdx+3:1, Q_COL_START=28;
      const advisorMap={}, techMap={}, lowQ11Records=[];
      const cleanName=raw=>raw.replace(/^鈑噴\s*/,"").trim();
      for (let i=dataStart; i<rows.length; i++) {
        const r=rows[i]; if (String(r[3]||"").trim()!=="M") continue;
        const factoryName=String(r[6]||"").trim(); if (!factoryName) continue;
        const factKey=factoryName.includes("八德")?"八德廠":"中壢廠";
        const advisor=cleanName(String(r[13]||"").trim()), tech=cleanName(String(r[14]||"").trim());
        const custName=String(r[2]||"").trim(), carNo=String(r[18]||"").trim();
        const scores={};
        ALL_Q_KEYS.forEach((q,idx)=>{
          const raw=String(r[Q_COL_START+idx]||"").trim().toUpperCase();
          if (raw==="N"||raw==="DK"||raw==="") return;
          const v=parseFloat(raw); if (!isNaN(v)&&v>=1&&v<=10) scores[q]=v;
        });
        if (Object.keys(scores).length===0) continue;
        if (scores["Q11"]!==undefined&&scores["Q11"]<8) lowQ11Records.push({factKey,custName,carNo,advisor,tech,scores});
        if (advisor&&!advisor.includes("SUM")&&!advisor.includes("宣陽")&&!advisor.includes("引擎")) {
          const k=factKey+"||"+advisor;
          if (!advisorMap[k]) advisorMap[k]={name:advisor,factory:factKey,samples:0,sums:{},rawScores:{}};
          advisorMap[k].samples++;
          ALL_Q_KEYS.forEach(q=>{
            if (scores[q]!==undefined) {
              if (!advisorMap[k].sums[q]) advisorMap[k].sums[q]={total:0,cnt:0};
              advisorMap[k].sums[q].total+=scores[q]; advisorMap[k].sums[q].cnt++;
              if (!advisorMap[k].rawScores[q]) advisorMap[k].rawScores[q]={sat:0,cnt:0};
              advisorMap[k].rawScores[q].cnt++; if(scores[q]>=9) advisorMap[k].rawScores[q].sat++;
            }
          });
        }
        if (tech&&!tech.includes("SUM")&&!tech.includes("宣陽")&&!tech.includes("引擎")&&!tech.includes("技師")) {
          const k=factKey+"||"+tech;
          if (!techMap[k]) techMap[k]={name:tech,factory:factKey,samples:0,sums:{},rawScores:{}};
          techMap[k].samples++;
          ALL_Q_KEYS.forEach(q=>{
            if (scores[q]!==undefined) {
              if (!techMap[k].sums[q]) techMap[k].sums[q]={total:0,cnt:0};
              techMap[k].sums[q].total+=scores[q]; techMap[k].sums[q].cnt++;
              if (!techMap[k].rawScores[q]) techMap[k].rawScores[q]={sat:0,cnt:0};
              techMap[k].rawScores[q].cnt++; if(scores[q]>=9) techMap[k].rawScores[q].sat++;
            }
          });
        }
      }
      function calcAvgLocal(map, respKeys) {
        return Object.values(map).map(p=>{
          const qScores={};
          ALL_Q_KEYS.forEach(q=>{if(p.sums[q]&&p.sums[q].cnt>0) qScores[q]=+((p.sums[q].total/p.sums[q].cnt)*10).toFixed(1);});
          let ss=0,sc=0,sat=0,satT=0;
          respKeys.forEach(q=>{
            if(p.sums[q]&&p.sums[q].cnt>0){ss+=p.sums[q].total;sc+=p.sums[q].cnt;}
            if(p.rawScores&&p.rawScores[q]){sat+=p.rawScores[q].sat;satT+=p.rawScores[q].cnt;}
          });
          const G=sc>0?ss/sc:null, F=satT>0?(sat/satT)*100:null;
          const newScore=(G!==null&&F!==null)?+(F*G).toFixed(1):null;
          return {name:p.name,factory:p.factory,samples:p.samples,qScores,newScore};
        });
      }
      const allAdvisors=calcAvgLocal(advisorMap,ADV_RESP), allTechs=calcAvgLocal(techMap,TECH_RESP);
      const result={};
      ["中壢廠","八德廠"].forEach(fk=>{
        result[fk]={
          advisors:allAdvisors.filter(a=>a.factory===fk).sort((a,b)=>b.samples-a.samples),
          techs:allTechs.filter(t=>t.factory===fk).sort((a,b)=>b.samples-a.samples),
          lowQ11Records:lowQ11Records.filter(r=>r.factKey===fk),
        };
      });
      return result;
    }
    function parseDCSheet(ws) {
      const rows=window.XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      let headerIdx=-1;
      rows.forEach((r,i)=>{if(String(r[0]||"").includes("單位")&&String(r[6]||"").includes("電訪")) headerIdx=i;});
      const dataStart=headerIdx>=0?headerIdx+1:1, records=[];
      for (let i=dataStart; i<rows.length; i++) {
        const r=rows[i]; const factory=String(r[0]||"").trim();
        if (!factory.includes("廠")) continue;
        const advisor=String(r[6]||"").trim(); if (!advisor) continue;
        records.push({factory,advisor,cust:String(r[3]||"").trim(),car:String(r[4]||"").trim(),
          date:String(r[5]||"").trim().slice(5),contacted:String(r[12]||"").trim(),
          result:String(r[13]||"").trim(),issue:String(r[10]||"").trim()});
      }
      return records;
    }
    function deriveDCStats(records) {
      const aMap={};
      records.forEach(rec=>{
        const k=rec.factory+"||"+rec.advisor;
        if (!aMap[k]) aMap[k]={name:rec.advisor,factory:rec.factory,total:0,contacted:0,completed:0};
        aMap[k].total++;
        if (rec.contacted==="是") aMap[k].contacted++;
        if (rec.result==="已完成"||(rec.contacted==="是"&&rec.result==="狀況良好")) aMap[k].completed++;
      });
      const byAdvisor=Object.values(aMap).map(a=>({...a,
        contactRate:a.total>0?+((a.contacted/a.total)*100).toFixed(1):0,
        fillRate:a.total>0?+((a.completed/a.total)*100).toFixed(1):0})).sort((a,b)=>b.fillRate-a.fillRate);
      const total=records.length, cont=records.filter(r=>r.contacted==="是").length;
      const good=records.filter(r=>r.result==="狀況良好").length, rew=records.filter(r=>["需重修","問題車"].includes(r.result)).length;
      const fMap={};
      records.forEach(r=>{
        if (!fMap[r.factory]) fMap[r.factory]={name:r.factory,total:0,contacted:0};
        fMap[r.factory].total++; if(r.contacted==="是") fMap[r.factory].contacted++;
      });
      const byFactory=Object.values(fMap).map(f=>({...f,contactRate:+((f.contacted/f.total)*100).toFixed(1)}));
      const issues=records.filter(r=>r.issue&&r.issue.length>3&&
        !["掛","掛斷","未接","語音","忙碌"].some(x=>r.issue.startsWith(x))&&
        (r.result==="需重修"||r.result==="問題車"||r.issue.includes("客"))
      ).slice(0,10).map(r=>({date:r.date,cust:r.cust,car:r.car,advisor:r.advisor,factory:r.factory,issue:r.issue,result:r.result}));
      return {summary:{totalCases:total,contacted:cont,notContacted:total-cont,
        contactRate:+((cont/total)*100).toFixed(1),confirmedGood:good,needRework:rew},byAdvisor,byFactory,issues};
    }
    function makeDot(alertMap, lineColor) {
      return function CustomDot(props) {
        const {cx,cy,index}=props;
        if (!alertMap[index]) return React.createElement("circle",{key:index,cx,cy,r:4,fill:lineColor,stroke:"none"});
        return React.createElement("g",{key:index},
          React.createElement("circle",{cx,cy,r:7,fill:"#fef2f2",stroke:"#dc2626",strokeWidth:1.5}),
          React.createElement("circle",{cx,cy,r:3.5,fill:"#dc2626"}));
      };
    }

    function App() {
      const [tab,setTab]=useState("summary");
      const [uploadState,setUploadState]=useState({main:null,dc:null});
      const [mainFiles,setMainFiles]=useState([]);
      const [dcFiles,setDcFiles]=useState([]);
      const [dataTime,setDataTime]=useState(null);
      const [dynDealers,setDynDealers]=useState(null);
      const [dynKpi,setDynKpi]=useState(null);
      const [dynMgtQ,setDynMgtQ]=useState(null);
      const [dynBranches,setDynBranches]=useState(null);
      const [dynStaff,setDynStaff]=useState(null);
      const [dynDC,setDynDC]=useState(null);
      const [storageStatus,setStorageStatus]=useState(null);

      function saveToCloud(key,data) {
        try { localStorage.setItem(key,JSON.stringify(data)); } catch(e){console.error("儲存失敗",e);}
      }
      useState(()=>{
        try {
          const mR=localStorage.getItem("csi_main");
          const dR=localStorage.getItem("csi_dc");
          const sR=localStorage.getItem("csi_staff");
          const tR=localStorage.getItem("csi_meta");
          let loaded=false;
          if(mR){const d=JSON.parse(mR);if(d.dealers)setDynDealers(d.dealers);if(d.kpi)setDynKpi(d.kpi);if(d.mgtQ)setDynMgtQ(d.mgtQ);if(d.branches)setDynBranches(d.branches);if(d.mainFiles)setMainFiles(d.mainFiles);loaded=true;}
          if(dR){const d=JSON.parse(dR);setDynDC(d.dc);if(d.dcFiles)setDcFiles(d.dcFiles);loaded=true;}
          if(sR){setDynStaff(JSON.parse(sR));loaded=true;}
          if(tR){const m=JSON.parse(tR);if(m.dataTime)setDataTime(m.dataTime);}
          if(loaded)setStorageStatus("loaded");
        } catch(e){}
      },[]);

      const hasMain=dynKpi!==null, hasDC=dynDC!==null, hasStaff=dynStaff!==null;
      const bdAlerts=useMemo(()=>calcAlerts(WEEKLY_DEF,"BD"),[]);
      const zlAlerts=useMemo(()=>calcAlerts(WEEKLY_DEF,"ZL"),[]);
      const BdDot=useMemo(()=>makeDot(bdAlerts,"#7c3aed"),[bdAlerts]);
      const ZlDot=useMemo(()=>makeDot(zlAlerts,"#2563eb"),[zlAlerts]);

      async function handleUpload(e,type) {
        const file=e.target.files?.[0]; if(!file) return; e.target.value=null;
        setUploadState(s=>({...s,[type]:"loading"}));
        try {
          const XLSX=await loadXLSX(), buf=await file.arrayBuffer(), wb=XLSX.read(buf,{type:"array"});
          const now=new Date();
          const nowStr=now.getFullYear()+"/"+String(now.getMonth()+1).padStart(2,"0")+"/"+String(now.getDate()).padStart(2,"0")+" "+String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
          setDataTime(nowStr);
          if (type==="main") {
            const sn=wb.SheetNames.find(n=>n.includes("各經銷及各廠成績")||n.includes("成績"))||wb.SheetNames[0];
            const {dealers:nd,mgtScore,mgtSamples,mgtQRow,mBranches}=parseSummarySheet(wb.Sheets[sn]);
            if (nd.length||mgtScore) {
              const NM={M:"銘勁",S:"順怡",F:"豐展",R:"榮佑",Y:"億和",Z:"東正",J:"茂豐"};
              const newD=[...nd.map(d=>({...d,name:NM[d.code]||d.code})),{name:"總代理",code:"MGT",score:mgtScore,samples:mgtSamples,isMGT:true}];
              const mj=nd.find(d=>d.isMingJin);
              const newKpi=mj?{overallScore:mj.score,mgtScore,totalSamples:mj.samples||0,mgtQRow,mBranches,mjQs:mj.qs}:null;
              setDynDealers(newD); if(newKpi)setDynKpi(newKpi); if(mgtQRow)setDynMgtQ(mgtQRow); if(mBranches)setDynBranches(mBranches);
              const nMF=[...mainFiles,file.name]; setMainFiles(nMF); setStorageStatus("saving");
              saveToCloud("csi_main",{dealers:newD,kpi:newKpi,mgtQ:mgtQRow,branches:mBranches,mainFiles:nMF});
            }
            const dn=wb.SheetNames.find(n=>n.includes("車主明細")||n.includes("明細"))||null;
            if (dn){const staff=parseDetailSheet(wb.Sheets[dn]);setDynStaff(staff);saveToCloud("csi_staff",staff);}
          } else {
            const recs=parseDCSheet(wb.Sheets[wb.SheetNames[0]]);

                      {fQ.length>0&&(
                        <div style={{background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",padding:"16px 18px"}}>
                          <div style={{fontWeight:700,fontSize:14,marginBottom:6,paddingLeft:"10px",borderLeft:"3px solid #b91c1c"}}>各題平均分 vs MGT 基準</div>
                          <div style={{fontSize:11,color:"#6b7280",marginBottom:12}}>{fname}　目標：全面超越 MGT</div>
                          <ResponsiveContainer width="100%" height={200}>
                            <BarChart data={fQ} margin={{top:4,right:16,left:-20,bottom:0}}>
                              <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f3f4f6"/>
                              <XAxis dataKey="q" tick={{fontSize:9,fill:"#6b7280"}} angle={-15} textAnchor="end" height={40}/>
                              <YAxis domain={[88,102]} tick={{fontSize:10,fill:"#9ca3af"}}/>
                              <Tooltip contentStyle={{borderRadius:10,border:"none"}}/>
                              <Bar dataKey="score" name="廠區均分" radius={[4,4,0,0]} barSize={22}>{fQ.map((d,i)=><Cell key={i} fill={d.score!=null&&d.score>=d.mgt?th.accent:"#fca5a5"}/>)}</Bar>
                            </BarChart>
                          </ResponsiveContainer>
                          <div style={{fontSize:11,color:"#6b7280",marginTop:8,display:"flex",gap:12}}>
                            <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:th.accent,borderRadius:2,display:"inline-block"}}/> 超越 MGT</span>
                            <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:"#fca5a5",borderRadius:2,display:"inline-block"}}/> 低於 MGT</span>
                          </div>
                        </div>
                      )}
                    </>
                  )}
                </div>
              );
            })()}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
